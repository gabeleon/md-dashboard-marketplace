<body>

<!-- Audit Modal (shared) -->
<div class="audit-overlay" id="auditOverlay" onclick="if(event.target===this)closeAudit()">
  <div class="audit-modal">
    <button class="audit-close" onclick="closeAudit()">&times;</button>
    <div class="audit-top" id="auditTop"></div>
    <div class="audit-body" id="auditBody"></div>
  </div>
</div>

<div id="app"></div>

<script>
/* __CONFIG_PLACEHOLDER__ */

// ============================================================
// DASHBOARD RENDERING ENGINE
// ============================================================

const BRAND = {
  ink:'#10182C', inkSoft:'#1C243B', inkMuted:'#39405A',
  green:'#04B477', greenDark:'#027C53', greenDeep:'#014835',
  teal:'#0D3F4A', orange:'#FB5004', yellow:'#FBBD04',
  mint:'#A4E8CE', berry:'#BC0278', sand:'#FBF7F0',
  eggshell:'#EBF8F2', neutral:'#47495A'
};

const COLOR_MAP = {
  primary: BRAND.green, green: BRAND.green, accent: BRAND.orange,
  orange: BRAND.orange, yellow: BRAND.yellow, mint: BRAND.mint,
  berry: BRAND.berry, teal: BRAND.teal, dark: BRAND.ink,
  'green-dark': BRAND.greenDark
};

const PALETTE = [BRAND.green,'#5BD5A5',BRAND.greenDark,BRAND.orange,BRAND.mint,BRAND.berry,BRAND.yellow,BRAND.teal,'#79D8B2','#8A6800'];

function resolveColor(name, idx) {
  if (!name) return PALETTE[idx % PALETTE.length];
  if (name.startsWith('#')) return name;
  return COLOR_MAP[name] || PALETTE[idx % PALETTE.length];
}

// ===== FORMATTING =====
const FMT = {
  n: n => (typeof n === 'number' ? n.toLocaleString('en-US') : n),
  k: n => { n = Number(n); return n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(n>=1e4?0:1)+'K' : n.toString(); },
  pct: n => Number(n).toFixed(1)+'%',
  dollar: n => { n = Number(n); return '$'+(n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(n>=1e4?0:1)+'K' : n.toLocaleString('en-US')); },
  raw: n => String(n)
};

function fmt(n, format) {
  if (typeof n === 'string' && isNaN(Number(n))) return n;
  return (FMT[format] || FMT.n)(n);
}

// ===== VALUE/UNIT SPLITTER =====
function splitValueUnit(formatted) {
  var s = String(formatted);
  // Handle patterns like "$2.8M", "24.8K", "3.2%", "50/50", "4.2min"
  var m = s.match(/^([^A-Za-z%]*?)([A-Za-z%]+)$/);
  if (m && m[2]) return {number: m[1], unit: m[2]};
  // Handle cases like "$2.8M" where $ is prefix
  m = s.match(/^(\$[\d,.]+)([A-Za-z]+)$/);
  if (m) return {number: m[1], unit: m[2]};
  return {number: s, unit: ''};
}

// ===== SAFE DOM HELPERS =====
function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'className') e.className = v;
    else if (k === 'onclick') e.onclick = v;
    else if (k.startsWith('data')) e.setAttribute(k.replace(/([A-Z])/g,'-$1').toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  if (children) {
    if (typeof children === 'string') e.textContent = children;
    else if (Array.isArray(children)) children.filter(Boolean).forEach(c => {
      if (typeof c === 'string') e.appendChild(document.createTextNode(c));
      else e.appendChild(c);
    });
    else e.appendChild(children);
  }
  return e;
}

function html(parent, htmlStr) {
  const doc = new DOMParser().parseFromString('<body>'+htmlStr+'</body>','text/html');
  Array.from(doc.body.childNodes).forEach(n => parent.appendChild(document.importNode(n, true)));
}

function svgEl(tag, attrs) {
  const NS = 'http://www.w3.org/2000/svg';
  const e = document.createElementNS(NS, tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k, v));
  return e;
}

// ============================================================
// CHART RENDERERS
// ============================================================

function renderAreaChart(container, chart) {
  const data = chart.data || [];
  if (!data.length) return;
  const xKey = chart.x || Object.keys(data[0])[0];
  const yKey = chart.y || Object.keys(data[0])[1];
  const y2Key = chart.y2;
  const W = 900, H = 320, mL = 52, mR = y2Key ? 52 : 20, mT = 22, mB = 46;

  const yVals = data.map(d => Number(d[yKey]));
  const maxY = Math.max(...yVals) * 1.05;
  const X = (i) => mL + (W-mL-mR)*i/(data.length-1);
  const Y = (v) => mT + (H-mT-mB)*(1 - v/maxY);

  const svg = svgEl('svg', {viewBox:`0 0 ${W} ${H}`, preserveAspectRatio:'xMidYMid meet'});

  // Grid lines
  const ticks = [0, maxY*.25, maxY*.5, maxY*.75, maxY];
  ticks.forEach(t => {
    const line = svgEl('line', {x1:mL, y1:Y(t), x2:W-mR, y2:Y(t), stroke:'rgba(16,24,44,.06)', 'stroke-width':'0.5'});
    svg.appendChild(line);
    const txt = svgEl('text', {x:mL-8, y:Y(t), 'text-anchor':'end', dy:'4', fill:'#47495A',
      'font-family':'JetBrains Mono', 'font-size':'10.5'});
    txt.textContent = fmt(Math.round(t), chart.y_format || 'k');
    svg.appendChild(txt);
  });

  // X-axis labels (sample ~8 labels)
  const step = Math.max(1, Math.floor(data.length / 8));
  data.forEach((d, i) => {
    if (i % step !== 0 && i !== data.length-1) return;
    const txt = svgEl('text', {x:X(i), y:H-mB+18, fill:'#47495A', 'font-family':'Inter', 'font-weight':'600', 'font-size':'11', 'text-anchor':'middle'});
    const val = String(d[xKey]);
    txt.textContent = val.length > 10 ? val.substring(5) : val;
    svg.appendChild(txt);
  });

  // Baseline at y=0
  svg.appendChild(svgEl('line', {x1:String(mL), y1:String(H-mB), x2:String(W-mR), y2:String(H-mB), stroke:'rgba(16,24,44,.12)', 'stroke-width':'1'}));

  // Ink bars underneath (when show_bars is enabled)
  if (chart.show_bars) {
    const barGap = (W-mL-mR)/data.length;
    const barW = Math.min(24, barGap*0.65);
    yVals.forEach((v, i) => {
      const cx = X(i);
      const y = Y(v);
      const h = Math.max(0, H-mB-y);
      svg.appendChild(svgEl('rect', {x:cx-barW/2, y:y, width:barW, height:h, fill:'#10182C', opacity:'.82', rx:'2'}));
    });
  }

  // Area fill
  const gid = 'ag-'+Math.random().toString(36).substr(2,6);
  const defs = svgEl('defs');
  const grad = svgEl('linearGradient', {id:gid, x1:'0', x2:'0', y1:'0', y2:'1'});
  const hasMA = !!chart.moving_average;
  const areaColor = hasMA ? '#04B477' : resolveColor(chart.color,0);
  const areaOpTop = hasMA ? '.15' : '.3';
  const s1 = svgEl('stop', {offset:'0', 'stop-color':areaColor, 'stop-opacity':areaOpTop});
  const s2 = svgEl('stop', {offset:'1', 'stop-color':areaColor, 'stop-opacity':'0'});
  grad.appendChild(s1); grad.appendChild(s2); defs.appendChild(grad); svg.appendChild(defs);

  const pts = yVals.map((v,i) => `${X(i).toFixed(1)},${Y(v).toFixed(1)}`);
  const areaD = `M ${pts[0]} ` + pts.slice(1).map(p => `L ${p}`).join(' ') + ` L ${X(data.length-1).toFixed(1)},${(H-mB)} L ${mL},${H-mB} Z`;
  svg.appendChild(svgEl('path', {d:areaD, fill:`url(#${gid})`}));

  // Line
  const lineColor = hasMA ? '#04B477' : resolveColor(chart.color,0);
  const lineD = `M ${pts[0]} ` + pts.slice(1).map(p => `L ${p}`).join(' ');
  svg.appendChild(svgEl('path', {d:lineD, fill:'none', stroke:lineColor, 'stroke-width':'2.2', 'stroke-linejoin':'round'}));

  // Moving average
  if (chart.moving_average) {
    const n = Number(chart.moving_average);
    const ma = yVals.map((v,i,arr) => {
      const start = Math.max(0, i-n+1);
      const slice = arr.slice(start, i+1);
      return slice.reduce((a,b)=>a+b,0)/slice.length;
    });
    const maD = ma.map((v,i) => `${(i?'L':'M')}${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
    svg.appendChild(svgEl('path', {d:maD, fill:'none', stroke:BRAND.orange, 'stroke-width':'1.5', 'stroke-dasharray':'4 3', opacity:'.8'}));
  }

  // Y2 axis
  if (y2Key) {
    const y2Vals = data.map(d => Number(d[y2Key]));
    const maxY2 = Math.max(...y2Vals) * 1.05;
    const Y2 = v => mT + (H-mT-mB)*(1 - v/maxY2);
    const lineD2 = y2Vals.map((v,i) => `${(i?'L':'M')}${X(i).toFixed(1)},${Y2(v).toFixed(1)}`).join(' ');
    svg.appendChild(svgEl('path', {d:lineD2, fill:'none', stroke:BRAND.mint, 'stroke-width':'1.8', opacity:'.7'}));
    [0, maxY2].forEach(t => {
      const txt = svgEl('text', {x:W-mR+8, y:Y2(t), fill:BRAND.mint, 'font-family':'JetBrains Mono', 'font-size':'10.5', dy:'4'});
      txt.textContent = fmt(Math.round(t), chart.y_format || 'k');
      svg.appendChild(txt);
    });
  }

  // Annotations
  (chart.annotations || []).forEach(ann => {
    const idx = data.findIndex(d => String(d[xKey]) === String(ann.x));
    if (idx < 0) return;
    const ax = X(idx), ay = Y(yVals[idx]);
    svg.appendChild(svgEl('line', {x1:ax, y1:ay-6, x2:ax, y2:mT+8, stroke:BRAND.orange, 'stroke-width':'1.2', 'stroke-dasharray':'3 2'}));
    svg.appendChild(svgEl('circle', {cx:ax, cy:ay, r:'4', fill:BRAND.orange}));
    const atxt = svgEl('text', {x:ax+8, y:mT+20, fill:BRAND.orange, 'font-family':'DM Sans', 'font-weight':'700', 'font-size':'12'});
    atxt.textContent = ann.label || '';
    svg.appendChild(atxt);
  });

  // Tooltip system: wrapper div with position:relative
  const wrap = el('div', {className:'chart-wrap', style:'position:relative'});
  wrap.appendChild(svg);

  // Create tooltip div
  const tooltip = el('div', {className:'chart-tooltip'});
  tooltip.appendChild(el('div', {className:'tt-label'}));
  tooltip.appendChild(el('div', {className:'tt-val'}));
  wrap.appendChild(tooltip);

  // Crosshair line
  const crosshair = svgEl('line', {x1:'0', y1:String(mT), x2:'0', y2:String(H-mB), stroke:'rgba(16,24,44,.2)', 'stroke-width':'1', 'stroke-dasharray':'3 2', opacity:'0'});
  svg.appendChild(crosshair);

  // Visible hover dots (small, hidden by default)
  const dotGroup = svgEl('g', {opacity:'0'});
  const hoverDot = svgEl('circle', {cx:'0', cy:'0', r:'3.5', fill:resolveColor(chart.color,0), stroke:'var(--white)', 'stroke-width':'2'});
  dotGroup.appendChild(hoverDot);
  if (y2Key) {
    const hoverDot2 = svgEl('circle', {cx:'0', cy:'0', r:'3.5', fill:BRAND.mint, stroke:'var(--white)', 'stroke-width':'2'});
    hoverDot2.setAttribute('data-y2', '1');
    dotGroup.appendChild(hoverDot2);
  }
  svg.appendChild(dotGroup);

  // Full-area hover overlay — snaps to nearest data point on mousemove
  const hitZone = svgEl('rect', {x:String(mL), y:String(mT), width:String(W-mL-mR), height:String(H-mT-mB), fill:'transparent', style:'cursor:crosshair'});
  const xPositions = data.map((d, i) => X(i));

  function findNearest(mouseXInSvg) {
    let closest = 0, minDist = Infinity;
    xPositions.forEach((px, i) => { const dist = Math.abs(px - mouseXInSvg); if (dist < minDist) { minDist = dist; closest = i; } });
    return closest;
  }

  hitZone.addEventListener('mousemove', function(e) {
    const svgRect = svg.getBoundingClientRect();
    const wrapRect = wrap.getBoundingClientRect();
    const mouseXInSvg = (e.clientX - svgRect.left) / svgRect.width * W;
    const i = findNearest(mouseXInSvg);
    const cx = X(i), cy = Y(yVals[i]);
    const ptX = cx / W * svgRect.width;
    const ptY = cy / H * svgRect.height;

    // Position tooltip
    let tipX = svgRect.left - wrapRect.left + ptX + 14;
    const tipY = svgRect.top - wrapRect.top + ptY - 36;
    // Flip tooltip to left side if too close to right edge
    if (tipX + 140 > wrapRect.width) tipX = svgRect.left - wrapRect.left + ptX - 154;
    tooltip.style.left = tipX + 'px';
    tooltip.style.top = tipY + 'px';

    // Fill tooltip
    tooltip.querySelector('.tt-label').textContent = String(data[i][xKey]);
    let valText = yKey + ': ' + fmt(yVals[i], chart.y_format || 'k');
    if (y2Key) valText += '  ·  ' + y2Key + ': ' + fmt(Number(data[i][y2Key]), chart.y_format || 'k');
    tooltip.querySelector('.tt-val').textContent = valText;
    tooltip.classList.add('show');

    // Crosshair
    crosshair.setAttribute('x1', String(cx));
    crosshair.setAttribute('x2', String(cx));
    crosshair.setAttribute('opacity', '1');

    // Dots
    dotGroup.setAttribute('opacity', '1');
    hoverDot.setAttribute('cx', String(cx));
    hoverDot.setAttribute('cy', String(cy));
    if (y2Key) {
      const y2ValsAll = data.map(dd => Number(dd[y2Key]));
      const maxY2 = Math.max(...y2ValsAll) * 1.05;
      const Y2 = v => mT + (H-mT-mB)*(1 - v/maxY2);
      const dot2 = dotGroup.querySelector('[data-y2]');
      if (dot2) { dot2.setAttribute('cx', String(cx)); dot2.setAttribute('cy', String(Y2(y2ValsAll[i]))); }
    }
  });
  hitZone.addEventListener('mouseleave', function() {
    tooltip.classList.remove('show');
    crosshair.setAttribute('opacity', '0');
    dotGroup.setAttribute('opacity', '0');
  });
  svg.appendChild(hitZone);

  container.appendChild(wrap);

  // Legend
  if (y2Key || chart.moving_average) {
    const leg = el('div', {className:'legend'});
    const addLeg = (color, label) => { const s = el('span'); s.appendChild(el('span', {className:'sw', style:`background:${color}`})); s.appendChild(document.createTextNode(label)); leg.appendChild(s); };
    addLeg(resolveColor(chart.color,0), yKey);
    if (chart.moving_average) addLeg(BRAND.orange, `${chart.moving_average}-day MA`);
    if (y2Key) addLeg(BRAND.mint, y2Key);
    container.appendChild(leg);
  }
}

function renderLineChart(container, chart) {
  // Line chart is area chart without the fill
  const modChart = {...chart, _noFill: true};
  renderAreaChart(container, chart);
}

function fmtDateLabel(val) {
  const s = String(val);
  const m = s.match(/^(\d{4})-(\d{2})/);
  if (m) {
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[parseInt(m[2])-1] + " '" + m[1].slice(2);
  }
  return s.length > 8 ? s.substring(0, 8) + '…' : s;
}

function renderBarChart(container, chart) {
  const data = chart.data || [];
  if (!data.length) return;
  const xKey = chart.x || chart.label || Object.keys(data[0])[0];
  const yKey = chart.y || chart.value || Object.keys(data[0])[1];
  const sorted = chart.sort === 'desc' ? [...data].sort((a,b) => Number(b[yKey])-Number(a[yKey])) :
                 chart.sort === 'asc' ? [...data].sort((a,b) => Number(a[yKey])-Number(b[yKey])) : data;
  const limited = chart.limit ? sorted.slice(0, chart.limit) : sorted;
  const n = limited.length;

  // Layout constants
  const needsRotation = n > 8;
  const W = 900, H = 320;
  const mL = 60, mR = 20, mT = 22, mB = needsRotation ? 55 : 46;
  const plotW = W - mL - mR, plotH = H - mT - mB;
  const maxY = Math.max(...limited.map(d => Number(d[yKey]))) * 1.08;

  // Bar sizing — switch to lollipop if bars would be < 8px
  const rawBarW = Math.min(36, Math.max(8, plotW / n * 0.72));
  const useLollipop = rawBarW < 8;
  const barW = useLollipop ? 3 : rawBarW;
  const gap = plotW / n;
  const X = i => mL + gap * i + gap / 2;
  const Y = v => mT + plotH * (1 - v / maxY);

  // Label thinning
  const labelStep = n > 12 ? Math.ceil(n / 12) : 1;

  // Value label display logic
  const showValues = chart.show_values;
  const valueMode = n > 20 ? 'none' : (n > 10 ? 'everyOther' : 'all');

  // Unique gradient id
  const gid = 'bar-grad-' + Math.random().toString(36).substr(2, 6);
  const barColor = resolveColor(chart.color, 0);

  const svg = svgEl('svg', {viewBox: '0 0 ' + W + ' ' + H, preserveAspectRatio: 'xMidYMid meet'});

  // --- Defs: gradient for bars ---
  const defs = svgEl('defs');
  const grad = svgEl('linearGradient', {id: gid, x1: '0', y1: '0', x2: '0', y2: '1'});
  const s1 = svgEl('stop', {offset: '0', 'stop-color': barColor, 'stop-opacity': '.72'});
  const s2 = svgEl('stop', {offset: '1', 'stop-color': barColor, 'stop-opacity': '1'});
  grad.appendChild(s1);
  grad.appendChild(s2);
  defs.appendChild(grad);
  svg.appendChild(defs);

  // --- Grid lines ---
  [0, .25, .5, .75, 1].forEach(function(f) {
    var t = maxY * f, y = Y(t);
    svg.appendChild(svgEl('line', {
      x1: mL, y1: y, x2: W - mR, y2: y,
      stroke: 'rgba(16,24,44,.06)', 'stroke-width': '0.5'
    }));
    var txt = svgEl('text', {
      x: mL - 10, y: y, 'text-anchor': 'end', dy: '3.5',
      fill: '#47495A', 'font-family': 'JetBrains Mono', 'font-size': '10.5'
    });
    txt.textContent = fmt(Math.round(t), chart.y_format || 'k');
    svg.appendChild(txt);
  });

  // --- Baseline at y=0 ---
  svg.appendChild(svgEl('line', {
    x1: mL, y1: H - mB, x2: W - mR, y2: H - mB,
    stroke: 'rgba(16,24,44,.15)', 'stroke-width': '1'
  }));

  // --- Bars ---
  limited.forEach(function(d, i) {
    var v = Number(d[yKey]);
    var cx = X(i);
    var y = Y(v);
    var h = Math.max(0, H - mB - y);
    var barX = cx - barW / 2;

    // Group for hover behavior
    var g = svgEl('g');
    g.setAttribute('class', 'bar-hover');
    g.setAttribute('data-idx', String(i));

    if (useLollipop) {
      // Lollipop style: thin line + circle
      g.appendChild(svgEl('line', {
        x1: cx, y1: y, x2: cx, y2: H - mB,
        stroke: 'url(#' + gid + ')', 'stroke-width': '3', 'stroke-linecap': 'round'
      }));
      g.appendChild(svgEl('circle', {
        cx: cx, cy: y, r: '4.5',
        fill: barColor, stroke: '#fff', 'stroke-width': '1.5'
      }));
    } else {
      // Standard bar with rounded top corners and gradient fill
      g.appendChild(svgEl('rect', {
        class: 'bar-fg', x: barX, y: y, width: barW, height: h,
        fill: 'url(#' + gid + ')', rx: '4', opacity: '.92'
      }));
    }

    // Invisible wider hit area for hover
    g.appendChild(svgEl('rect', {
      x: cx - (barW / 2 + 4), y: mT, width: barW + 8, height: plotH,
      fill: 'transparent', 'pointer-events': 'all'
    }));

    svg.appendChild(g);

    // --- X-axis labels ---
    if (i % labelStep === 0 || i === n - 1) {
      var label = fmtDateLabel(d[xKey]);

      if (needsRotation) {
        var txt = svgEl('text', {
          x: cx, y: H - mB + 12, 'text-anchor': 'end', fill: '#47495A',
          'font-family': 'Inter', 'font-weight': '500', 'font-size': '10',
          transform: 'rotate(-45,' + cx + ',' + (H - mB + 12) + ')'
        });
        txt.textContent = label;
        svg.appendChild(txt);
      } else {
        var txt2 = svgEl('text', {
          x: cx, y: H - mB + 18, 'text-anchor': 'middle', fill: '#47495A',
          'font-family': 'Inter', 'font-weight': '500', 'font-size': '10.5'
        });
        txt2.textContent = label;
        svg.appendChild(txt2);
      }
    }

    // --- Value labels ---
    if (showValues && valueMode !== 'none') {
      var showThis = valueMode === 'all' || (valueMode === 'everyOther' && i % 2 === 0);
      if (showThis) {
        var barTallEnough = h > 28;
        var valStr = fmt(v, chart.y_format || 'k');
        if (barTallEnough && !useLollipop) {
          // Inside bar — white text
          var vtxt = svgEl('text', {
            x: cx, y: y + 16, 'text-anchor': 'middle',
            fill: '#FFFFFF', 'font-family': 'JetBrains Mono', 'font-weight': '600', 'font-size': '10.5'
          });
          vtxt.textContent = valStr;
          svg.appendChild(vtxt);
        } else {
          // Above bar — colored text
          var vtxt2 = svgEl('text', {
            x: cx, y: y - 6, 'text-anchor': 'middle',
            fill: barColor, 'font-family': 'JetBrains Mono', 'font-weight': '600', 'font-size': '10.5'
          });
          vtxt2.textContent = valStr;
          svg.appendChild(vtxt2);
        }
      }
    }
  });

  // --- Build DOM: wrap with tooltip ---
  var wrap = el('div', {className: 'chart-wrap', style: 'position:relative'});
  wrap.appendChild(svg);

  // Tooltip div (HTML, outside SVG) — built with safe DOM methods
  var tooltip = el('div', {className: 'chart-tooltip'});
  var ttLabel = el('div', {className: 'tt-label'});
  var ttVal = el('div', {className: 'tt-val'});
  tooltip.appendChild(ttLabel);
  tooltip.appendChild(ttVal);
  wrap.appendChild(tooltip);

  // --- Hover interaction ---
  var barGroups = svg.querySelectorAll('.bar-hover');
  barGroups.forEach(function(g) {
    g.addEventListener('mouseenter', function(e) {
      var idx = parseInt(this.getAttribute('data-idx'));
      var d = limited[idx];
      var v = Number(d[yKey]);
      var lbl = fmtDateLabel(d[xKey]);
      ttLabel.textContent = lbl;
      ttVal.textContent = fmt(v, chart.y_format || 'k');

      // Position tooltip near the top of the bar
      var svgRect = svg.getBoundingClientRect();
      var wrapRect = wrap.getBoundingClientRect();
      var cx = X(idx);
      var yTop = Y(v);
      // Convert SVG coords to DOM coords
      var scaleX = svgRect.width / W;
      var scaleY = svgRect.height / H;
      var domX = (cx * scaleX) + (svgRect.left - wrapRect.left);
      var domY = (yTop * scaleY) + (svgRect.top - wrapRect.top);

      tooltip.style.left = domX + 'px';
      tooltip.style.top = (domY - 44) + 'px';
      tooltip.style.transform = 'translateX(-50%)';
      tooltip.classList.add('show');
    });
    g.addEventListener('mouseleave', function() {
      tooltip.classList.remove('show');
    });
  });

  container.appendChild(wrap);
}

function renderHorizontalBarChart(container, chart) {
  const data = chart.data || [];
  if (!data.length) return;
  const labelKey = chart.label || Object.keys(data[0])[0];
  const valueKey = chart.value || Object.keys(data[0])[1];
  const sorted = chart.sort === 'desc' ? [...data].sort((a,b) => Number(b[valueKey])-Number(a[valueKey])) :
                 chart.sort === 'asc' ? [...data].sort((a,b) => Number(a[valueKey])-Number(b[valueKey])) : data;
  const limited = chart.limit ? sorted.slice(0, chart.limit) : sorted;
  const maxVal = Math.max(...limited.map(d => Number(d[valueKey])));
  const defaultColor = BRAND.green;

  const wrap = el('div', {style:'position:relative'});
  const tooltip = el('div', {className:'chart-tooltip'});
  tooltip.appendChild(el('div', {className:'tt-label'}));
  tooltip.appendChild(el('div', {className:'tt-val'}));
  wrap.appendChild(tooltip);

  limited.forEach((d, i) => {
    const pct = (Number(d[valueKey]) / maxVal * 100).toFixed(1);
    const barColor = chart.multi_color ? resolveColor(chart.color, i) : (chart.color ? resolveColor(chart.color, 0) : defaultColor);
    const row = el('div', {className:'bar-row'});
    row.appendChild(el('div', {className:'lbl'}, String(d[labelKey])));
    const track = el('div', {className:'bar-track'});
    const fill = el('div', {className:'bar-fill', style:`width:${pct}%;background:${barColor}`});
    track.appendChild(fill);
    row.appendChild(track);
    row.appendChild(el('div', {className:'val'}, fmt(d[valueKey], chart.y_format || 'n')));

    row.addEventListener('mouseenter', function(e) {
      const wrapRect = wrap.getBoundingClientRect();
      const rowRect = row.getBoundingClientRect();
      tooltip.querySelector('.tt-label').textContent = String(d[labelKey]);
      tooltip.querySelector('.tt-val').textContent = fmt(d[valueKey], chart.y_format || 'n');
      tooltip.style.left = (rowRect.left - wrapRect.left + rowRect.width / 2) + 'px';
      tooltip.style.top = (rowRect.top - wrapRect.top - 44) + 'px';
      tooltip.style.transform = 'translateX(-50%)';
      tooltip.classList.add('show');
    });
    row.addEventListener('mouseleave', function() {
      tooltip.classList.remove('show');
    });

    wrap.appendChild(row);
  });
  container.appendChild(wrap);
}

function renderDonutChart(container, chart) {
  const data = chart.data || [];
  if (!data.length) return;
  const labelKey = chart.label || Object.keys(data[0])[0];
  const valueKey = chart.value || Object.keys(data[0])[1];
  const total = data.reduce((a,d) => a + Number(d[valueKey]), 0);
  const outerR = 110, innerR = 66;

  const wrap = el('div', {className:'chart-wrap', style:'max-width:280px;margin:0 auto;position:relative'});
  const svg = svgEl('svg', {viewBox:'-140 -140 280 280'});
  let startA = -Math.PI/2;

  // Tooltip
  const tooltip = el('div', {className:'chart-tooltip'});
  tooltip.appendChild(el('div', {className:'tt-label'}));
  tooltip.appendChild(el('div', {className:'tt-val'}));
  wrap.appendChild(tooltip);

  const segments = [];

  data.forEach((d, i) => {
    const angle = (Number(d[valueKey]) / total) * Math.PI * 2;
    const endA = startA + angle;
    const large = angle > Math.PI ? 1 : 0;
    const segColor = resolveColor(chart.colors ? chart.colors[i] : null, i);
    const path = svgEl('path', {
      d: `M ${Math.cos(startA)*outerR} ${Math.sin(startA)*outerR} A ${outerR} ${outerR} 0 ${large} 1 ${Math.cos(endA)*outerR} ${Math.sin(endA)*outerR} L ${Math.cos(endA)*innerR} ${Math.sin(endA)*innerR} A ${innerR} ${innerR} 0 ${large} 0 ${Math.cos(startA)*innerR} ${Math.sin(startA)*innerR} Z`,
      fill: segColor,
      opacity: '.85',
      style: 'transition:opacity .2s,transform .15s;transform-origin:0 0'
    });
    segments.push(path);
    svg.appendChild(path);

    // Invisible hover arc (wider for easier targeting)
    const hoverR = outerR + 8;
    const hoverPath = svgEl('path', {
      d: `M ${Math.cos(startA)*hoverR} ${Math.sin(startA)*hoverR} A ${hoverR} ${hoverR} 0 ${large} 1 ${Math.cos(endA)*hoverR} ${Math.sin(endA)*hoverR} L ${Math.cos(endA)*(innerR-4)} ${Math.sin(endA)*(innerR-4)} A ${innerR-4} ${innerR-4} 0 ${large} 0 ${Math.cos(startA)*(innerR-4)} ${Math.sin(startA)*(innerR-4)} Z`,
      fill: 'transparent',
      style: 'cursor:pointer'
    });
    const midAngle = startA + angle / 2;
    hoverPath.addEventListener('mouseenter', function(e) {
      path.setAttribute('opacity', '1');
      path.setAttribute('transform', 'translate(' + (Math.cos(midAngle)*4).toFixed(1) + ',' + (Math.sin(midAngle)*4).toFixed(1) + ')');
      // Position tooltip
      var svgRect = svg.getBoundingClientRect();
      var wrapRect = wrap.getBoundingClientRect();
      var tipX = (Math.cos(midAngle)*outerR + 140) / 280 * svgRect.width + (svgRect.left - wrapRect.left);
      var tipY = (Math.sin(midAngle)*outerR + 140) / 280 * svgRect.height + (svgRect.top - wrapRect.top) - 48;
      tooltip.querySelector('.tt-label').textContent = d[labelKey];
      tooltip.querySelector('.tt-val').textContent = fmt(d[valueKey], chart.y_format || 'k') + '  (' + (Number(d[valueKey]) / total * 100).toFixed(1) + '%)';
      tooltip.style.left = tipX + 'px';
      tooltip.style.top = tipY + 'px';
      tooltip.style.transform = 'translateX(-50%)';
      tooltip.classList.add('show');
    });
    hoverPath.addEventListener('mouseleave', function() {
      path.setAttribute('opacity', '.85');
      path.setAttribute('transform', '');
      tooltip.classList.remove('show');
    });
    svg.appendChild(hoverPath);

    startA = endA;
  });

  // Center text
  const ctxt = svgEl('text', {x:'0', y:'-4', 'text-anchor':'middle', 'font-family':'DM Sans', 'font-size':'22', 'font-weight':'700', fill:BRAND.ink});
  ctxt.textContent = fmt(total, 'k');
  svg.appendChild(ctxt);
  const csub = svgEl('text', {x:'0', y:'14', 'text-anchor':'middle', 'font-family':'JetBrains Mono', 'font-size':'10', fill:BRAND.neutral});
  csub.textContent = 'total';
  svg.appendChild(csub);

  wrap.appendChild(svg);
  container.appendChild(wrap);

  // Legend
  const leg = el('div', {className:'legend', style:'justify-content:center;margin-top:18px'});
  data.forEach((d,i) => {
    const s = el('span');
    s.appendChild(el('span', {className:'sw', style:`background:${resolveColor(chart.colors?chart.colors[i]:null,i)}`}));
    s.appendChild(document.createTextNode(`${d[labelKey]} (${fmt(d[valueKey],'k')})`));
    leg.appendChild(s);
  });
  container.appendChild(leg);
}

function renderPieChart(container, chart) {
  // Pie is donut with innerR=0 — reuse donut
  renderDonutChart(container, chart);
}

function renderHeatmap(container, chart) {
  const data = chart.data || [];
  if (!data.length) return;
  const xKey = chart.x || Object.keys(data[0])[0];
  const yKey = chart.y || Object.keys(data[0])[1];
  const vKey = chart.value || Object.keys(data[0])[2];

  const xLabels = [...new Set(data.map(d => d[xKey]))];
  const yLabels = [...new Set(data.map(d => d[yKey]))];
  const lookup = {};
  data.forEach(d => { lookup[`${d[yKey]}-${d[xKey]}`] = Number(d[vKey]); });
  const vals = data.map(d => Number(d[vKey])).filter(v => v > 0);
  const maxV = Math.max(...vals);
  const minV = Math.min(...vals);
  const logMin = Math.log(minV+1), logMax = Math.log(maxV+1);

  // Auto-calculate cell dimensions based on grid size
  const cellMinH = Math.max(36, Math.min(52, 360/yLabels.length));
  const cellMinW = Math.max(45, Math.min(70, 900/xLabels.length));
  const cellFontSize = Math.max(10, Math.min(13, 160/xLabels.length));
  // Estimate cell width to decide whether to show text
  const approxCellW = 900 / xLabels.length;
  const showCellText = approxCellW > 30;

  // Determine x-label thinning
  const xLabelStep = xLabels.length > 12 ? (xLabels.length > 18 ? 3 : 2) : 1;

  // Detect dark card context
  const isDarkCard = container.closest && container.closest('.card.dark');

  const grid = el('div', {className:'heatmap-grid'});

  // X labels — show every Nth when many columns
  const xRow = el('div', {className:'x-labels'});
  xLabels.forEach((x, xi) => {
    const s = el('span');
    s.textContent = (xi % xLabelStep === 0) ? x : '';
    xRow.appendChild(s);
  });
  grid.appendChild(xRow);

  // Y labels — use white text on dark cards
  const yCol = el('div', {className:'y-labels'});
  if (isDarkCard) yCol.style.color = 'var(--white)';
  yLabels.forEach(y => { const d = el('div'); d.textContent = y; yCol.appendChild(d); });
  grid.appendChild(yCol);

  // Cells
  const cells = el('div', {className:'cells', style:`grid-template-columns:repeat(${xLabels.length},minmax(${cellMinW}px,1fr));grid-template-rows:repeat(${yLabels.length},${cellMinH}px)`});
  if (isDarkCard) cells.style.overflowX = 'auto';
  yLabels.forEach(y => {
    xLabels.forEach(x => {
      const v = lookup[`${y}-${x}`] || 0;
      const t = v > 0 ? Math.max(0, Math.min(1, (Math.log(v+1)-logMin)/(logMax-logMin))) : 0;
      let r,g,b;
      if (t < 0.5) { const s=t*2; r=Math.round(16+(13-16)*s); g=Math.round(24+(63-24)*s); b=Math.round(44+(74-44)*s); }
      else { const s=(t-0.5)*2; r=Math.round(13+(4-13)*s); g=Math.round(63+(180-63)*s); b=Math.round(74+(119-74)*s); }
      const cell = el('div', {className:'hm-cell', style:`background:rgb(${r},${g},${b});font-size:${cellFontSize}px;min-height:${cellMinH}px;padding:3px`, title:`${y} ${x}: ${v.toLocaleString()}`});
      if (v > 0 && showCellText) cell.textContent = v > 999 ? fmt(v,'k') : v;
      cells.appendChild(cell);
    });
  });
  grid.appendChild(cells);

  // If heatmap, ensure the parent card has min-height
  const parentCard = container.closest && container.closest('.card');
  if (parentCard) parentCard.style.minHeight = '340px';

  container.appendChild(grid);
}

function renderTreemap(container, chart) {
  const data = chart.data || [];
  if (!data.length) return;
  const labelKey = chart.label || Object.keys(data[0])[0];
  const valueKey = chart.value || Object.keys(data[0])[1];
  const sorted = [...data].sort((a,b) => Number(b[valueKey]) - Number(a[valueKey]));
  const limited = chart.limit ? sorted.slice(0, chart.limit) : sorted;

  // Contrast-aware text color: light colors get dark text, dark colors get white
  const DARK_TEXT_INDICES = new Set();
  PALETTE.forEach((c, i) => {
    const hex = c.replace('#','');
    const r = parseInt(hex.substr(0,2),16), g = parseInt(hex.substr(2,2),16), b = parseInt(hex.substr(4,2),16);
    if ((r*299 + g*587 + b*114) / 1000 > 160) DARK_TEXT_INDICES.add(i);
  });

  const W = 840, H = 360;
  const root = d3.hierarchy({children: limited.map(d => ({name: d[labelKey], value: Number(d[valueKey])}))}).sum(d => d.value);
  d3.treemap().size([W, H]).padding(4).round(true)(root);

  const wrap = el('div', {className:'chart-wrap', style:'position:relative'});
  const svg = svgEl('svg', {viewBox:`0 0 ${W} ${H}`});

  root.leaves().forEach((leaf, i) => {
    const x = leaf.x0, y = leaf.y0, w = leaf.x1-leaf.x0, h = leaf.y1-leaf.y0;
    const color = resolveColor(null, i);
    const useDarkText = DARK_TEXT_INDICES.has(i % PALETTE.length);
    const textFill = useDarkText ? 'var(--ink)' : '#fff';
    const subFill = useDarkText ? 'rgba(16,24,44,.6)' : 'rgba(255,255,255,.75)';

    // Rect with hover group
    const g = svgEl('g', {style:'cursor:pointer'});
    g.appendChild(svgEl('rect', {x, y, width:w, height:h, fill:color, rx:'6', opacity:'.92'}));

    // Title text (always try to show)
    if (w > 40 && h > 24) {
      const maxChars = Math.max(3, Math.floor((w - 16) / 7.5));
      const name = leaf.data.name;
      const displayName = name.length > maxChars ? name.substring(0, maxChars-1)+'…' : name;
      const txt = svgEl('text', {x:x+8, y:y+20, fill:textFill, 'font-family':'Inter', 'font-weight':'600', 'font-size':'12.5'});
      txt.textContent = displayName;
      g.appendChild(txt);
      if (h > 40) {
        const vtxt = svgEl('text', {x:x+8, y:y+36, fill:subFill, 'font-family':'JetBrains Mono', 'font-size':'11'});
        vtxt.textContent = fmt(leaf.data.value, chart.y_format || 'k');
        g.appendChild(vtxt);
      }
    } else {
      // Small cells: add inner border so boundaries are still visible
      g.appendChild(svgEl('rect', {x:x+0.5, y:y+0.5, width:Math.max(0,w-1), height:Math.max(0,h-1), fill:'none', stroke:'rgba(255,255,255,.3)', 'stroke-width':'1', rx:'4'}));
    }

    // Invisible hover rect for tooltip
    const hoverRect = svgEl('rect', {x, y, width:w, height:h, fill:'transparent', 'data-name':leaf.data.name, 'data-value':fmt(leaf.data.value, chart.y_format || 'k')});
    const tipEl = el('div', {className:'chart-tooltip', style:'position:absolute;pointer-events:none'});
    hoverRect.addEventListener('mouseenter', function(e) {
      const svgRect = svg.getBoundingClientRect();
      const wrapRect = wrap.getBoundingClientRect();
      tipEl.textContent = leaf.data.name + ' — ' + fmt(leaf.data.value, chart.y_format || 'k');
      tipEl.classList.add('show');
      tipEl.style.left = (x * svgRect.width / W + svgRect.left - wrapRect.left) + 'px';
      tipEl.style.top = (y * svgRect.height / H + svgRect.top - wrapRect.top - 32) + 'px';
    });
    hoverRect.addEventListener('mouseleave', function() { tipEl.classList.remove('show'); });
    g.appendChild(hoverRect);
    svg.appendChild(g);
    wrap.appendChild(tipEl);
  });

  wrap.appendChild(svg);
  container.appendChild(wrap);
}

function renderScatterChart(container, chart) {
  const data = chart.data || [];
  if (!data.length) return;
  const xKey = chart.x || Object.keys(data[0])[0];
  const yKey = chart.y || Object.keys(data[0])[1];
  const sizeKey = chart.size;

  const W = 900, H = 400, mL = 52, mR = 20, mT = 22, mB = 46;
  const xVals = data.map(d => Number(d[xKey]));
  const yVals = data.map(d => Number(d[yKey]));
  const maxX = Math.max(...xVals)*1.1, minX = Math.min(...xVals)*0.9;
  const maxY = Math.max(...yVals)*1.1, minY = Math.min(...yVals)*0.9;
  const X = v => mL + (W-mL-mR)*((v-minX)/(maxX-minX));
  const Y = v => mT + (H-mT-mB)*(1-(v-minY)/(maxY-minY));

  const svg = svgEl('svg', {viewBox:`0 0 ${W} ${H}`});
  // Grid
  [0,.25,.5,.75,1].forEach(f => {
    const t = minY+(maxY-minY)*f, y=Y(t);
    svg.appendChild(svgEl('line', {x1:mL, y1:y, x2:W-mR, y2:y, stroke:'rgba(16,24,44,.06)', 'stroke-dasharray':'2 3'}));
  });

  data.forEach((d, i) => {
    const r = sizeKey ? Math.max(4, Math.min(20, Math.sqrt(Number(d[sizeKey])))) : 6;
    svg.appendChild(svgEl('circle', {cx:X(Number(d[xKey])), cy:Y(Number(d[yKey])), r, fill:resolveColor(chart.color,0), opacity:'.65'}));
  });

  const wrap = el('div', {className:'chart-wrap'});
  wrap.appendChild(svg);
  container.appendChild(wrap);
}

function renderSparkline(container, chart) {
  const data = chart.data || [];
  if (!data.length) return;
  const yKey = chart.y || Object.keys(data[0])[1] || Object.keys(data[0])[0];
  const series = data.map(d => Number(d[yKey]));
  const W = 200, H = 32, pad = 1;
  const min = Math.min(...series), max = Math.max(...series), range = (max-min)||1;
  const pts = series.map((v,i) => [pad+(W-2*pad)*i/(series.length-1), H-pad-(H-2*pad)*(v-min)/range]);

  const svg = svgEl('svg', {viewBox:`0 0 ${W} ${H}`, style:'width:100%;height:32px'});
  const gid = 'sg-'+Math.random().toString(36).substr(2,6);
  const defs = svgEl('defs');
  const grad = svgEl('linearGradient', {id:gid, x1:'0', x2:'0', y1:'0', y2:'1'});
  grad.appendChild(svgEl('stop', {offset:'0', 'stop-color':resolveColor(chart.color,0), 'stop-opacity':'.4'}));
  grad.appendChild(svgEl('stop', {offset:'1', 'stop-color':resolveColor(chart.color,0), 'stop-opacity':'0'}));
  defs.appendChild(grad); svg.appendChild(defs);

  const d = pts.map((p,i) => (i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const d2 = d + ` L ${(W-pad)} ${(H-pad)} L ${pad} ${(H-pad)} Z`;
  svg.appendChild(svgEl('path', {d:d2, fill:`url(#${gid})`}));
  svg.appendChild(svgEl('path', {d, fill:'none', stroke:resolveColor(chart.color,0), 'stroke-width':'1.5', 'stroke-linejoin':'round'}));
  svg.appendChild(svgEl('circle', {cx:pts[pts.length-1][0].toFixed(1), cy:pts[pts.length-1][1].toFixed(1), r:'2', fill:resolveColor(chart.color,0)}));

  container.appendChild(svg);
}

function renderTable(container, chart) {
  const data = chart.data || [];
  if (!data.length) return;
  const cols = Object.keys(data[0]);

  // Detect which columns are numeric and find their max for mini-bars
  const numericCols = {};
  cols.forEach(c => {
    const vals = data.map(d => d[c]).filter(v => typeof v === 'number');
    if (vals.length === data.length) numericCols[c] = Math.max(...vals.map(Math.abs));
  });

  // Determine which column to show mini-bars on (the primary numeric column, usually 2nd)
  const barCol = chart.bar_column || (Object.keys(numericCols).length > 0 ? Object.keys(numericCols)[0] : null);
  const barMax = barCol ? numericCols[barCol] : 0;

  const table = el('table', {className:'styled-table'});

  // Header
  const thead = el('thead');
  const tr = el('tr');
  cols.forEach((c, i) => {
    const th = el('th');
    th.textContent = c.replace(/_/g, ' ');
    if (numericCols[c] !== undefined && i > 0) th.style.textAlign = 'right';
    tr.appendChild(th);
  });
  thead.appendChild(tr);
  table.appendChild(thead);

  // Body
  const tbody = el('tbody');
  data.forEach((row, ri) => {
    const r = el('tr');
    cols.forEach((c, ci) => {
      const isNum = typeof row[c] === 'number';
      const isFirst = ci === 0;
      let cls = '';
      if (isFirst) cls = 'row-label';
      else if (isNum) cls = 'num';

      const td = el('td', {className: cls});
      if (isNum && ci > 0) td.style.textAlign = 'right';

      if (isNum) {
        const formatted = fmt(row[c], chart.y_format || 'n');
        td.textContent = formatted;
        // Color positive/negative if the column name suggests it (delta, change, growth, diff)
        const lc = c.toLowerCase();
        if (lc.includes('delta') || lc.includes('change') || lc.includes('growth') || lc.includes('diff')) {
          if (row[c] > 0) td.classList.add('positive');
          else if (row[c] < 0) td.classList.add('negative');
        }
      } else {
        td.textContent = String(row[c]);
      }

      // Mini-bar on the designated bar column
      if (c === barCol && isNum && barMax > 0) {
        td.classList.add('bar-cell');
        const miniBar = el('div', {className:'mini-bar'});
        const pct = Math.abs(row[c]) / barMax * 100;
        const fill = el('div', {className:'mini-fill', style:`width:${pct.toFixed(1)}%`});
        miniBar.appendChild(fill);
        td.appendChild(miniBar);
      }

      r.appendChild(td);
    });
    tbody.appendChild(r);
  });
  table.appendChild(tbody);

  // Wrap in a scrollable container for wide tables
  const wrap = el('div', {style:'overflow-x:auto;border-radius:10px'});
  wrap.appendChild(table);
  container.appendChild(wrap);
}

function renderStatChart(container, chart) {
  const data = chart.data || [];
  if (!data.length) return;
  const labelKey = chart.label || Object.keys(data[0])[0];
  const valueKey = chart.value || Object.keys(data[0])[1];
  const stack = el('div', {className:'stat-stack'});
  data.forEach((d, i) => {
    const item = el('div', {className:'item' + (i%3===1?' orange':'')});
    const k = el('div', {className:'k'});
    const kSpan = el('span', {className:'auditable'});
    if (d.audit_id) kSpan.onclick = () => showAudit(d.audit_id);
    kSpan.textContent = fmt(d[valueKey], chart.y_format || 'n');
    k.appendChild(kSpan);
    item.appendChild(k);
    const l = el('div', {className:'l'});
    l.textContent = d[labelKey];
    item.appendChild(l);
    stack.appendChild(item);
  });
  container.appendChild(stack);
}

function renderProgressChart(container, chart) {
  const data = chart.data || [];
  if (!data.length) return;
  const labelKey = chart.label || Object.keys(data[0])[0];
  const valueKey = chart.value || Object.keys(data[0])[1];
  const maxKey = chart.max;
  const maxVal = maxKey ? Math.max(...data.map(d => Number(d[maxKey]))) : Math.max(...data.map(d => Number(d[valueKey])));

  data.forEach((d, i) => {
    const pct = (Number(d[valueKey]) / (maxKey ? Number(d[maxKey]) : maxVal) * 100).toFixed(1);
    const row = el('div', {className:'progress-row'});
    row.appendChild(el('div', {className:'lbl'}, String(d[labelKey])));
    const track = el('div', {className:'track'});
    track.appendChild(el('div', {className:'fill', style:`width:${pct}%;background:${resolveColor(chart.color, i)}`}));
    row.appendChild(track);
    row.appendChild(el('div', {className:'val'}, fmt(d[valueKey], chart.y_format || 'n')));
    container.appendChild(row);
  });
}

function renderFunnelChart(container, chart) {
  const data = chart.data || [];
  if (!data.length) return;
  const labelKey = chart.label || Object.keys(data[0])[0];
  const valueKey = chart.value || Object.keys(data[0])[1];
  const maxVal = Math.max(...data.map(d => Number(d[valueKey])));
  const n = data.length;

  // Color interpolation from green (#04B477) to teal (#0D3F4A)
  function lerpColor(t) {
    var r = Math.round(4 + (13 - 4) * t);
    var g = Math.round(180 + (63 - 180) * t);
    var b = Math.round(119 + (74 - 119) * t);
    return 'rgb(' + r + ',' + g + ',' + b + ')';
  }

  // Tooltip (shared across all bars)
  var wrap = el('div', {style:'position:relative'});
  var tooltip = el('div', {className:'chart-tooltip'});
  tooltip.appendChild(el('div', {className:'tt-label'}));
  tooltip.appendChild(el('div', {className:'tt-val'}));
  wrap.appendChild(tooltip);

  data.forEach(function(d, i) {
    var v = Number(d[valueKey]);
    var pct = (v / maxVal * 100).toFixed(1);
    var barColor = lerpColor(n > 1 ? i / (n - 1) : 0);

    // Conversion pill between rows
    if (i > 0) {
      var prevV = Number(data[i - 1][valueKey]);
      var stepConv = prevV > 0 ? (v / prevV * 100).toFixed(1) : '0.0';
      var convRow = el('div', {className:'funnel-conv'});
      var pill = el('div', {className:'pill'});
      pill.appendChild(document.createTextNode('↓ ' + stepConv + '%'));
      convRow.appendChild(pill);
      wrap.appendChild(convRow);
    }

    var step = el('div', {className:'funnel-step'});
    var labelText = String(d[labelKey]);
    step.appendChild(el('div', {className:'funnel-label', title:labelText}, labelText));

    var bar = el('div', {className:'funnel-bar', style:'width:' + pct + '%;background:' + barColor});
    bar.textContent = fmt(v, chart.y_format || 'n');

    // Tooltip on hover
    bar.addEventListener('mouseenter', function(e) {
      var wrapRect = wrap.getBoundingClientRect();
      var barRect = bar.getBoundingClientRect();
      tooltip.querySelector('.tt-label').textContent = labelText;
      tooltip.querySelector('.tt-val').textContent = fmt(v, chart.y_format || 'n') + '  (' + pct + '%)';
      tooltip.style.left = (barRect.left - wrapRect.left + barRect.width / 2) + 'px';
      tooltip.style.top = (barRect.top - wrapRect.top - 48) + 'px';
      tooltip.style.transform = 'translateX(-50%)';
      tooltip.classList.add('show');
    });
    bar.addEventListener('mouseleave', function() {
      tooltip.classList.remove('show');
    });

    step.appendChild(bar);
    step.appendChild(el('div', {className:'funnel-pct'}, pct + '%'));
    wrap.appendChild(step);
  });

  container.appendChild(wrap);
}

function renderComparison(container, chart) {
  const data = chart.data || [];
  if (!data.length) return;
  const labelKey = chart.label || Object.keys(data[0])[0];
  const aKey = chart.a_value || Object.keys(data[0])[1];
  const bKey = chart.b_value || Object.keys(data[0])[2];
  const aLabel = chart.a_label || aKey;
  const bLabel = chart.b_label || bKey;
  // higher_is_better: default true. Set to false for metrics like churn, support tickets
  const higherBetter = chart.higher_is_better !== false;

  data.forEach(d => {
    const aNum = Number(d[aKey]) || 0;
    const bNum = Number(d[bKey]) || 0;
    // Determine winner: which side is "better"
    const aWins = higherBetter ? aNum >= bNum : aNum <= bNum;
    const bWins = !aWins;
    const delta = aNum !== 0 ? (((bNum - aNum) / Math.abs(aNum)) * 100).toFixed(1) : '0.0';
    const deltaPositive = higherBetter ? bNum > aNum : bNum < aNum;

    const row = el('div', {className:'vs-row', style:'margin-bottom:16px;border:1px solid var(--rule);border-radius:14px;overflow:hidden'});

    // Left column
    const aCol = el('div', {className:'vs-col' + (aWins ? ' a-col' : ' b-col')});
    aCol.appendChild(el('div', {className:'group-label'}, aLabel));
    aCol.appendChild(el('div', {className:'big'}, fmt(d[aKey], chart.y_format || 'n')));
    aCol.appendChild(el('div', {className:'detail'}, String(d[labelKey])));

    // Divider with delta badge
    const divEl = el('div', {className:'vs-divider'});
    const deltaColor = deltaPositive ? 'var(--green-dark)' : 'var(--orange)';
    const deltaSign = Number(delta) > 0 ? '+' : '';
    const tag = el('div', {className:'tag', style:`color:${deltaColor};border-color:${deltaColor}33`}, deltaSign + delta + '%');
    divEl.appendChild(tag);

    // Right column
    const bCol = el('div', {className:'vs-col' + (bWins ? ' a-col' : ' b-col')});
    bCol.appendChild(el('div', {className:'group-label'}, bLabel));
    bCol.appendChild(el('div', {className:'big'}, fmt(d[bKey], chart.y_format || 'n')));
    bCol.appendChild(el('div', {className:'detail'}, String(d[labelKey])));

    row.appendChild(aCol); row.appendChild(divEl); row.appendChild(bCol);
    container.appendChild(row);
  });
}

function renderPolarChart(container, chart) {
  const data = chart.data || [];
  if (!data.length) return;
  const labelKey = chart.label || Object.keys(data[0])[0];
  const valueKey = chart.value || Object.keys(data[0])[1];
  const max = Math.max(...data.map(d => Number(d[valueKey])));
  const innerR = 36, outerR = 120;

  const svg = svgEl('svg', {viewBox:'-150 -150 300 300'});
  // Grid circles
  [.25,.5,.75,1].forEach(r => {
    svg.appendChild(svgEl('circle', {cx:0, cy:0, r:innerR+(outerR-innerR)*r, fill:'none', stroke:'rgba(16,24,44,.08)', 'stroke-dasharray':'1.5 2'}));
  });

  data.forEach((d, i) => {
    const a0 = (i/data.length)*Math.PI*2 - Math.PI/2;
    const a1 = ((i+1)/data.length)*Math.PI*2 - Math.PI/2;
    const r = innerR + (outerR-innerR)*(Number(d[valueKey])/max);
    const path = svgEl('path', {
      d: `M ${Math.cos(a0)*innerR} ${Math.sin(a0)*innerR} L ${Math.cos(a0)*r} ${Math.sin(a0)*r} A ${r} ${r} 0 0 1 ${Math.cos(a1)*r} ${Math.sin(a1)*r} L ${Math.cos(a1)*innerR} ${Math.sin(a1)*innerR} A ${innerR} ${innerR} 0 0 0 ${Math.cos(a0)*innerR} ${Math.sin(a0)*innerR} Z`,
      fill: resolveColor(null, i), opacity: '.9'
    });
    svg.appendChild(path);

    // Label
    const midA = (a0+a1)/2;
    const lr = outerR + 16;
    const txt = svgEl('text', {x:Math.cos(midA)*lr, y:Math.sin(midA)*lr+4, 'text-anchor':'middle', 'font-family':'JetBrains Mono', 'font-size':'10', fill:'#47495A'});
    txt.textContent = String(d[labelKey]).substring(0,8);
    svg.appendChild(txt);
  });

  const wrap = el('div', {className:'chart-wrap', style:'max-width:320px;margin:0 auto'});
  wrap.appendChild(svg);
  container.appendChild(wrap);
}

function renderMetricRow(container, chart) {
  renderHorizontalBarChart(container, chart);
}

function renderStackedBar(container, chart) {
  const data = chart.data || [];
  if (!data.length) return;
  const xKey = chart.x || Object.keys(data[0])[0];
  const allKeys = Object.keys(data[0]).filter(k => k !== xKey);
  const yKeys = chart.y_keys || allKeys;

  const W = 900, H = 340, mL = 52, mR = 20, mT = 22, mB = 46;
  const totals = data.map(d => yKeys.reduce((s,k) => s + Number(d[k] || 0), 0));
  const maxY = Math.max(...totals) * 1.1;
  const gap = (W-mL-mR)/data.length;
  const barW = Math.min(36, gap*0.7);
  const X = i => mL + gap*i + gap/2;
  const Y = v => mT + (H-mT-mB)*(1 - v/maxY);

  const svg = svgEl('svg', {viewBox:`0 0 ${W} ${H}`});
  [0,.5,1].forEach(f => {
    const t = maxY*f, y = Y(t);
    svg.appendChild(svgEl('line', {x1:mL, y1:y, x2:W-mR, y2:y, stroke:'rgba(16,24,44,.06)', 'stroke-dasharray':'2 3'}));
    const txt = svgEl('text', {x:mL-8, y, 'text-anchor':'end', dy:'4', fill:'#47495A', 'font-family':'JetBrains Mono', 'font-size':'10.5'});
    txt.textContent = fmt(Math.round(t), 'k');
    svg.appendChild(txt);
  });

  data.forEach((d, i) => {
    let cumY = 0;
    yKeys.forEach((k, ki) => {
      const v = Number(d[k] || 0);
      const y = Y(cumY + v), h = Y(cumY) - y;
      svg.appendChild(svgEl('rect', {x:X(i)-barW/2, y, width:barW, height:Math.max(0,h), fill:resolveColor(null,ki), rx:'1'}));
      cumY += v;
    });
    const txt = svgEl('text', {x:X(i), y:H-mB+16, 'text-anchor':'middle', fill:'#47495A', 'font-family':'Inter', 'font-weight':'600', 'font-size':'10.5'});
    txt.textContent = String(d[xKey]).substring(0,10);
    svg.appendChild(txt);
  });

  const wrap = el('div', {className:'chart-wrap'});
  wrap.appendChild(svg);
  container.appendChild(wrap);

  // Legend
  const leg = el('div', {className:'legend'});
  yKeys.forEach((k,i) => {
    const s = el('span');
    s.appendChild(el('span', {className:'sw', style:`background:${resolveColor(null,i)}`}));
    s.appendChild(document.createTextNode(k.replace(/_/g,' ')));
    leg.appendChild(s);
  });
  container.appendChild(leg);
}

function renderDiagram(container, chart) {
  const code = chart.code || '';
  if (!code.trim()) return;
  const wrap = el('div', {className:'mermaid-wrap'});
  const mermaidDiv = el('div', {className:'mermaid'});
  mermaidDiv.textContent = code;
  wrap.appendChild(mermaidDiv);
  container.appendChild(wrap);
}

function renderHighlightNumber(container, chart) {
  const wrap = el('div', {className:'highlight-number'});
  // Eyebrow
  if (chart.title || chart.eyebrow) {
    wrap.appendChild(el('div', {className:'hn-eyebrow'}, chart.eyebrow || chart.title || ''));
  }
  // Big tally number
  if (chart.value) {
    wrap.appendChild(el('div', {className:'hn-tally'}, String(chart.value)));
  }
  // Label / unit line
  if (chart.label) {
    wrap.appendChild(el('div', {className:'hn-unit'}, chart.label));
  }
  // Split row (e.g., User Messages / AI Messages)
  if (chart.split && chart.split.length) {
    const splitRow = el('div', {className:'hn-metrics'});
    chart.split.forEach(function(s) {
      const cell = el('div', {className:'hn-metric'});
      if (s.color) cell.style.borderLeftColor = resolveColor(s.color, 0);
      cell.appendChild(el('div', {className:'hn-mv'}, String(s.value)));
      cell.appendChild(el('div', {className:'hn-ml'}, s.label || ''));
      splitRow.appendChild(cell);
    });
    wrap.appendChild(splitRow);
  }
  // Metrics row
  if (chart.metrics && chart.metrics.length) {
    const metricsRow = el('div', {className:'hn-metrics'});
    chart.metrics.forEach(function(m) {
      const cell = el('div', {className:'hn-metric'});
      cell.appendChild(el('div', {className:'hn-mv'}, String(m.value)));
      cell.appendChild(el('div', {className:'hn-ml'}, m.label || ''));
      metricsRow.appendChild(cell);
    });
    wrap.appendChild(metricsRow);
  }
  container.appendChild(wrap);
}

function renderQuadChart(container, chart) {
  var data = chart.data || [];
  if (!data.length) return;
  var total = data.reduce(function(s, d) { return s + Number(d.value || 0); }, 0);
  var grid = el('div', {className:'quad'});
  data.forEach(function(d) {
    var cellClass = 'quad-cell' + (d.style ? ' ' + d.style : '');
    var cell = el('div', {className: cellClass});
    // Top label
    if (d.label) cell.appendChild(el('div', {className:'top-lbl'}, d.label));
    // Big number
    if (d.value !== undefined) cell.appendChild(el('div', {className:'bn'}, fmt(d.value, 'k')));
    // Tagline
    if (d.tagline) cell.appendChild(el('div', {className:'tagline'}, d.tagline));
    // Detail
    if (d.detail) cell.appendChild(el('div', {className:'detail'}, d.detail));
    // Corner percentage
    if (total > 0 && d.value !== undefined) {
      var pct = (Number(d.value) / total * 100).toFixed(1) + '%';
      cell.appendChild(el('div', {className:'corner'}, pct));
    }
    grid.appendChild(cell);
  });
  container.appendChild(grid);
}

function showAudit(id) {
  const audit = (CONFIG.audits || {})[id];
  if (!audit) return;
  const overlay = document.getElementById('auditOverlay');
  const top = document.getElementById('auditTop');
  const body = document.getElementById('auditBody');

  while (top.firstChild) top.removeChild(top.firstChild);
  while (body.firstChild) body.removeChild(body.firstChild);

  // --- AUDIT TOP ---
  top.appendChild(el('h3', {}, audit.title || id));

  // Big value display
  if (audit.value !== undefined && audit.value !== null && audit.value !== '') {
    top.appendChild(el('div', {className:'audit-val'}, String(audit.value)));
  }

  // Confidence badge
  if (audit.confidence) {
    const conf = el('div', {className:`audit-conf ${audit.confidence}`});
    conf.textContent = audit.confidence.charAt(0).toUpperCase() + audit.confidence.slice(1) + ' confidence';
    top.appendChild(conf);
  }

  // 4-cell metadata grid
  const meta = audit.meta || {};
  const hasOwner = meta.owner, hasFresh = meta.freshness, hasSample = meta.sampleSize, hasTrail = meta.auditTrail;
  if (hasOwner || hasFresh || hasSample || hasTrail) {
    const mg = el('div', {className:'audit-meta-grid'});
    const addMeta = (label, value) => {
      if (!value) return;
      const cell = el('div');
      cell.appendChild(el('div', {className:'meta-label'}, label));
      cell.appendChild(el('div', {className:'meta-value'}, String(value)));
      mg.appendChild(cell);
    };
    addMeta('Owner', meta.owner);
    addMeta('Freshness', meta.freshness);
    addMeta('Sample Size', meta.sampleSize);
    addMeta('Audit Trail', meta.auditTrail);
    top.appendChild(mg);
  }

  // --- AUDIT BODY ---

  // Filters Applied section: filter chips + filter chain
  const auditFilters = audit.filters || [];
  const filterChain = audit.filterChain || [];
  // Also show active dashboard filter state
  const filterKeys = Object.keys(activeFilters);
  if (auditFilters.length || filterKeys.length || filterChain.length) {
    const sec = el('div', {className:'audit-section'});
    sec.appendChild(el('h4', {}, '🔒 Filters Applied'));
    const chips = el('div', {className:'filter-chips'});
    auditFilters.forEach(f => {
      const chipType = f.type || 'active';
      const chip = el('span', {className:`fchip ${chipType}`});
      chip.textContent = f.label || f;
      chips.appendChild(chip);
    });
    filterKeys.forEach(fk => {
      const fv = activeFilters[fk];
      if (fv && fv !== 'all') {
        const chip = el('span', {className:'fchip active'});
        chip.textContent = fk + ': ' + fv;
        chips.appendChild(chip);
      }
    });
    if (chips.childNodes.length) sec.appendChild(chips);

    // Filter chain (numbered pipeline steps)
    if (filterChain.length) {
      const chainDiv = el('div', {style:'margin-top:12px'});
      filterChain.forEach((step, idx) => {
        const isResult = step.isResult || (idx === filterChain.length - 1);
        const stepEl = el('div', {className:`chain-step${isResult ? ' result' : ''}`});
        stepEl.appendChild(el('div', {className:'step-label'}, `${idx + 1}. ${step.step || ''}`));
        if (step.detail) stepEl.appendChild(el('div', {className:'step-detail'}, step.detail));
        if (step.count !== undefined) stepEl.appendChild(el('div', {className:'step-count'}, String(step.count)));
        chainDiv.appendChild(stepEl);
      });
      sec.appendChild(chainDiv);
    }
    body.appendChild(sec);
  }

  // Definition section
  if (audit.definition) {
    const sec = el('div', {className:'audit-section'});
    sec.appendChild(el('h4', {}, '📖 Definition'));
    sec.appendChild(el('p', {}, audit.definition));
    body.appendChild(sec);
  }

  // Methodology section (keep for backward compatibility)
  if (audit.methodology) {
    const sec = el('div', {className:'audit-section'});
    sec.appendChild(el('h4', {}, '📖 Methodology'));
    sec.appendChild(el('p', {}, audit.methodology));
    body.appendChild(sec);
  }

  // Formula section
  if (audit.formula) {
    const sec = el('div', {className:'audit-section'});
    sec.appendChild(el('h4', {}, '📐 Formula'));
    sec.appendChild(el('div', {className:'formula'}, audit.formula));
    body.appendChild(sec);
  }

  // Caveat section
  if (audit.caveat) {
    const sec = el('div', {className:'audit-section'});
    sec.appendChild(el('h4', {}, '⚠️ Caveat'));
    sec.appendChild(el('div', {className:'caveat'}, audit.caveat));
    body.appendChild(sec);
  }

  // SQL section with proper card structure
  if (audit.sql) {
    const sec = el('div', {className:'audit-section'});
    sec.appendChild(el('h4', {}, 'SQL Query'));
    const sqlCard = el('div', {className:'sql-section'});

    // Header with Copy SQL button
    const sqlHeader = el('div', {className:'sql-header'});
    sqlHeader.appendChild(el('span', {className:'sql-label'}, 'Source Query'));
    const copyBtn = el('button', {className:'copy-btn', onclick: function() {
      navigator.clipboard.writeText(audit.sql).then(() => {
        this.textContent = 'Copied!';
        setTimeout(() => { this.textContent = 'Copy SQL'; }, 1500);
      });
    }}, 'Copy SQL');
    sqlHeader.appendChild(copyBtn);
    sqlCard.appendChild(sqlHeader);

    // Code block
    const pre = el('pre', {className:'sql-block', style:'border-radius:0'});
    pre.textContent = audit.sql;
    sqlCard.appendChild(pre);

    // Tables used footer
    const tables = audit.tables || [];
    if (tables.length) {
      const footer = el('div', {className:'tables-used'});
      footer.appendChild(document.createTextNode('Tables: '));
      const tList = Array.isArray(tables) ? tables : [tables];
      tList.forEach((t, i) => {
        if (i > 0) footer.appendChild(document.createTextNode(' '));
        footer.appendChild(el('code', {}, t));
      });
      sqlCard.appendChild(footer);
    }

    sec.appendChild(sqlCard);
    body.appendChild(sec);
  } else if (audit.tables) {
    // Tables without SQL - show standalone
    const sec = el('div', {className:'audit-section'});
    sec.appendChild(el('h4', {}, 'Tables Used'));
    sec.appendChild(el('p', {}, (Array.isArray(audit.tables) ? audit.tables : [audit.tables]).join(', ')));
    body.appendChild(sec);
  }

  // Legacy: filters_applied (backward compat)
  if (audit.filters_applied && !auditFilters.length) {
    const sec = el('div', {className:'audit-section'});
    sec.appendChild(el('h4', {}, 'Filters Applied'));
    const chips = el('div', {className:'filter-chips'});
    const flist = Array.isArray(audit.filters_applied) ? audit.filters_applied : [audit.filters_applied];
    flist.forEach(f => {
      const chip = el('span', {className:'fchip active'});
      chip.textContent = f;
      chips.appendChild(chip);
    });
    sec.appendChild(chips);
    body.appendChild(sec);
  }

  // Legacy: source_table
  if (audit.source_table) {
    const sec = el('div', {className:'audit-section'});
    sec.appendChild(el('h4', {}, 'Source Table'));
    const code = el('code', {style:'font-family:"JetBrains Mono",monospace;font-size:12px;background:var(--sand);padding:4px 8px;border-radius:4px'});
    code.textContent = audit.source_table;
    const p = el('p');
    p.appendChild(code);
    sec.appendChild(p);
    body.appendChild(sec);
  }

  // Legacy: notes
  if (audit.notes) {
    const sec = el('div', {className:'audit-section'});
    sec.appendChild(el('h4', {}, 'Notes'));
    sec.appendChild(el('p', {}, audit.notes));
    body.appendChild(sec);
  }

  overlay.classList.add('show');
}

function closeAudit() {
  document.getElementById('auditOverlay').classList.remove('show');
}

// ============================================================
// FILTER SYSTEM
// ============================================================

let activeFilters = {};

function initFilters() {
  const filters = CONFIG.filters || [];
  if (!filters.length) return;

  const bar = el('div', {className:'filter-bar'});
  bar.appendChild(el('div', {className:'filter-label'}, 'Filters'));

  filters.forEach(f => {
    const select = el('select', {className:'filter-select', id:`filter-${f.id}`});
    select.onchange = () => applyFilters();
    (f.options || []).forEach(opt => {
      const o = el('option', {value: opt.value || opt.label});
      o.textContent = opt.label || opt.value;
      if (opt.default) o.selected = true;
      select.appendChild(o);
    });
    bar.appendChild(select);
    activeFilters[f.id] = (f.options.find(o => o.default) || f.options[0] || {}).value || '';
  });

  const app = document.getElementById('app');
  // Insert after hero
  const hero = app.querySelector('.hero');
  if (hero && hero.nextSibling) app.insertBefore(bar, hero.nextSibling);
  else app.appendChild(bar);
}

function applyFilters() {
  const filters = CONFIG.filters || [];
  filters.forEach(f => {
    const select = document.getElementById(`filter-${f.id}`);
    if (select) activeFilters[f.id] = select.value;
  });
  // Re-render sections
  document.querySelectorAll('.body-section').forEach(s => s.remove());
  renderSections();
}

function filterData(data) {
  if (!data || !data.length) return data;
  const filters = CONFIG.filters || [];
  let filtered = data;
  filters.forEach(f => {
    const val = activeFilters[f.id];
    if (val && val !== 'all' && f.key) {
      filtered = filtered.filter(d => !d[f.key] || d[f.key] === val || String(d[f.key]) === String(val));
    }
  });
  return filtered;
}

function renderSections() {
  const app = document.getElementById('app');
  const sections = CONFIG.sections || [];
  const totalSections = sections.length;

  sections.forEach((section, si) => {
    const div = el('div', {className:'body-section'});

    // Section header
    const head = el('div', {className:'section-head'});
    const num = el('div', {className:'section-num'});
    html(num, `<b>${section.number || String(si+1).padStart(2,'0')}</b> / ${section.total || String(totalSections).padStart(2,'0')}`);
    head.appendChild(num);
    head.appendChild(el('h2', {className:'section-title'}, section.title || ''));
    if (section.kicker) head.appendChild(el('div', {className:'section-kicker'}, section.kicker));
    div.appendChild(head);

    // Section text
    if (section.text) div.appendChild(el('p', {className:'section-text'}, section.text));

    // Cards grid
    const cards = section.cards || [];
    if (cards.length) {
      // Determine grid class
      let gridClass = 'grid ';
      const hasSpan2 = cards.some(c => (c.modifiers||[]).includes('span-2'));
      const hasSpanLeft = cards.some(c => (c.modifiers||[]).includes('span-left'));
      const hasSpanRight = cards.some(c => (c.modifiers||[]).includes('span-right'));
      // Count total standalone insights (insight-only cards)
      const insightOnlyCards = cards.filter(c => c.insights && c.insights.length && (!c.charts || !c.charts.length));
      const totalInsights = insightOnlyCards.reduce((sum, c) => sum + c.insights.length, 0);
      const allAreInsights = insightOnlyCards.length === cards.length;
      if (hasSpanLeft) gridClass += 'g-2-1';
      else if (hasSpanRight) gridClass += 'g-1-2';
      else if (allAreInsights && totalInsights === 2) gridClass += 'g-2';
      else if (cards.length === 1 || hasSpan2) gridClass += 'g-1';
      else if (cards.length === 3) gridClass += 'g-3';
      else gridClass += 'g-2';

      const grid = el('div', {className: gridClass});

      cards.forEach(card => {
        // Insights render as insight blocks, not cards
        if (card.insights && card.insights.length && !card.charts.length) {
          card.insights.forEach(ins => {
            const insEl = el('div', {className:`insight ${ins.style || ''}`});
            if (ins.eyebrow) insEl.appendChild(el('div', {className:'i-eyebrow'}, ins.eyebrow));
            if (ins.stat) {
              const stat = el('div', {className:'i-stat'});
              const statSpan = el('span', {className:'auditable'});
              if (ins.audit_id) statSpan.onclick = () => showAudit(ins.audit_id);
              statSpan.textContent = ins.stat;
              stat.appendChild(statSpan);
              if (ins.stat_unit) stat.appendChild(el('span', {className:'unit'}, ins.stat_unit));
              insEl.appendChild(stat);
            }
            if (ins.title) insEl.appendChild(el('div', {className:'i-title'}, ins.title));
            if (ins.body) insEl.appendChild(el('div', {className:'i-body'}, ins.body));
            grid.appendChild(insEl);
          });
          return;
        }

        const cardEl = el('div', {className:'card'});
        (card.modifiers || []).forEach(m => {
          if (m === 'dark' || m === 'eggshell') cardEl.classList.add(m);
          if (m === 'span-2') cardEl.classList.add('span-2');
        });

        if (card.title) {
          const head = el('div', {className:'card-head'});
          head.appendChild(el('h3', {className:'card-title'}, card.title));
          if (card.meta) {
            head.appendChild(el('div', {className:'card-meta mono'}, card.meta));
          }
          cardEl.appendChild(head);
        }
        if (card.text) cardEl.appendChild(el('p', {className:'card-sub'}, card.text));

        // Render charts
        (card.charts || []).forEach(chart => {
          const chartData = filterData(chart.data);
          const filteredChart = {...chart, data: chartData};
          const renderer = CHART_RENDERERS[chart.type];
          if (renderer) {
            renderer(cardEl, filteredChart);
          } else {
            cardEl.appendChild(el('p', {className:'card-sub', style:'color:var(--orange)'}, `Unknown chart type: ${chart.type}`));
          }
        });

        // Render insights within card
        (card.insights || []).forEach(ins => {
          const insDiv = el('div', {style:'margin-top:18px;padding-top:18px;border-top:1px solid var(--rule)'});
          if (ins.eyebrow) insDiv.appendChild(el('div', {className:'card-eyebrow'}, ins.eyebrow));
          if (ins.stat) {
            const big = el('div', {style:'font-family:"DM Sans";font-weight:700;font-size:36px;letter-spacing:-.03em;color:var(--green-dark)'});
            const bigSpan = el('span', {className:'auditable'});
            if (ins.audit_id) bigSpan.onclick = () => showAudit(ins.audit_id);
            bigSpan.textContent = ins.stat;
            big.appendChild(bigSpan);
            insDiv.appendChild(big);
          }
          if (ins.title) insDiv.appendChild(el('div', {style:'font-weight:600;font-size:15px;margin-top:6px'}, ins.title));
          if (ins.body) insDiv.appendChild(el('p', {className:'card-sub'}, ins.body));
          cardEl.appendChild(insDiv);
        });

        grid.appendChild(cardEl);
      });

      div.appendChild(grid);
    }

    app.appendChild(div);
  });
}

function renderFooter() {
  const footer = CONFIG.footer || {};
  if (!footer.source && !footer.updated && !footer.tables && !footer.stats) return null;
  const foot = el('footer', {className:'page-footer'});
  const inner = el('div', {className:'inner'});

  // Column 1: Brand + report type + generation date
  const col1 = el('div');
  const meta = CONFIG.meta || {};
  if (meta.title) html(col1, '<b>' + meta.title + '</b>');
  if (meta.subtitle) col1.appendChild(el('div', {style:'margin-top:4px'}, meta.subtitle));
  if (footer.updated) col1.appendChild(el('div', {style:'margin-top:4px'}, 'Generated ' + footer.updated));
  else if (footer.source) {
    html(col1, '<b>Data source</b> · ' + footer.source);
  }
  inner.appendChild(col1);

  // Column 2: Source tables in mono font
  if (footer.tables && footer.tables.length) {
    const col2 = el('div');
    col2.appendChild(el('div', {style:'font-weight:600;color:var(--white);margin-bottom:6px'}, 'Source Tables'));
    const tableList = el('div', {className:'mono', style:'font-size:11px;line-height:1.8;opacity:.7'});
    footer.tables.forEach(function(t) {
      tableList.appendChild(el('div', {}, t));
    });
    col2.appendChild(tableList);
    inner.appendChild(col2);
  } else if (footer.source && footer.updated) {
    // Fallback: show source in column 2
    const col2 = el('div');
    html(col2, '<b>Data source</b> · ' + footer.source);
    inner.appendChild(col2);
  }

  // Column 3: Summary stats
  if (footer.stats && footer.stats.length) {
    const col3 = el('div', {style:'text-align:right'});
    footer.stats.forEach(function(s) {
      const row = el('div', {style:'margin-bottom:4px'});
      if (s.label && s.value) {
        row.appendChild(el('b', {}, s.value));
        row.appendChild(document.createTextNode(' ' + s.label));
      } else {
        row.textContent = String(s);
      }
      col3.appendChild(row);
    });
    inner.appendChild(col3);
  }

  foot.appendChild(inner);
  return foot;
}

// ============================================================
// BOOT
// ============================================================

(function boot() {
  if (typeof CONFIG === 'undefined') {
    document.getElementById('app').textContent = 'Error: No CONFIG found. Run build_dashboard.py to generate.';
    return;
  }

  // Apply theme overrides
  const theme = CONFIG.theme || {};
  if (theme.primary) document.documentElement.style.setProperty('--green', theme.primary);
  if (theme.dark) document.documentElement.style.setProperty('--ink', theme.dark);
  if (theme.accent) document.documentElement.style.setProperty('--orange', theme.accent);
  if (theme.bg) document.documentElement.style.setProperty('--sand', theme.bg);

  // Set page title
  document.title = (CONFIG.meta || {}).title || 'Dashboard';

  const app = document.getElementById('app');

  // Hero
  app.appendChild(renderHero());

  // Filters
  initFilters();

  // Sections
  renderSections();

  // Footer
  const footer = renderFooter();
  if (footer) app.appendChild(footer);

  // Initialize Mermaid diagrams after all content is rendered
  if (typeof mermaid !== 'undefined') {
    mermaid.initialize({
      startOnLoad: false,
      theme: 'neutral',
      fontFamily: 'Inter, sans-serif',
      flowchart: {
        padding: 20,
        nodeSpacing: 40,
        rankSpacing: 60,
        htmlLabels: true,
        useMaxWidth: true,
        curve: 'basis',
        defaultRenderer: 'dagre-wrapper'
      },
      themeVariables: {
        fontSize: '14px',
        nodePadding: '14px',
        nodeRadius: '10px',
        mainBkg: '#EBF8F2',
        nodeBorder: '#04B477',
        lineColor: '#39405A',
        arrowheadColor: '#39405A',
        textColor: '#10182C'
      }
    });
    try {
      mermaid.run();
      // Post-render fix: expand clipped edge labels and node labels
      setTimeout(function() {
        document.querySelectorAll('.mermaid .edgeLabel foreignObject').forEach(function(fo) {
          var span = fo.querySelector('span');
          if (span) {
            var textW = span.scrollWidth + 16;
            var textH = span.scrollHeight + 8;
            var curW = parseFloat(fo.getAttribute('width')) || 0;
            var curH = parseFloat(fo.getAttribute('height')) || 0;
            if (textW > curW) {
              var diff = textW - curW;
              fo.setAttribute('width', textW);
              var curX = parseFloat(fo.getAttribute('x')) || 0;
              fo.setAttribute('x', curX - diff/2);
            }
            if (textH > curH) fo.setAttribute('height', textH);
          }
          fo.style.overflow = 'visible';
        });
        document.querySelectorAll('.mermaid .nodeLabel').forEach(function(nl) {
          nl.style.overflow = 'visible';
          nl.style.whiteSpace = 'nowrap';
        });
      }, 200);
    } catch(e) { /* mermaid diagrams may not exist */ }
  }
})();
</script>
