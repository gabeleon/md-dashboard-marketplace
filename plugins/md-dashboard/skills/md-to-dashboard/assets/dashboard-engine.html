<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400;1,9..40,500;1,9..40,700;1,9..40,800&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
/* ============================================================
   DASHBOARD ENGINE — Boldin Design System
   Generated by md-to-dashboard skill
   ============================================================ */
:root{
  --ink:#10182C;--ink-soft:#1C243B;--ink-muted:#39405A;
  --green:#04B477;--green-dark:#027C53;--green-deep:#014835;
  --teal:#0D3F4A;
  --white:#FFFFFF;--sand:#FBF7F0;--eggshell:#EBF8F2;
  --orange:#FB5004;--yellow:#FBBD04;--mint:#A4E8CE;--berry:#BC0278;
  --neutral:#47495A;
  --rule:rgba(16,24,44,.08);--rule-strong:rgba(16,24,44,.15);
  --rule-on-ink:rgba(255,255,255,.10);--rule-on-ink-strong:rgba(255,255,255,.22);
  --shadow-card:0 1px 2px rgba(16,24,44,.04),0 8px 24px -10px rgba(16,24,44,.07);
  --shadow-hi:0 1px 3px rgba(16,24,44,.06),0 24px 60px -28px rgba(16,24,44,.18);
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--sand);color:var(--ink);
  font-family:"Inter",system-ui,sans-serif;font-feature-settings:"ss01","cv11";-webkit-font-smoothing:antialiased}
i,em{font-style:normal}
.mono{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-variant-numeric:tabular-nums}
a{color:inherit}
.page{max-width:1480px;margin:0 auto;padding:0}

/* ===== HERO ===== */
.hero{background:var(--ink);color:var(--white);position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;inset:0;
  background-image:radial-gradient(circle at 88% 18%,rgba(4,180,119,.18),transparent 45%),
                   radial-gradient(circle at 10% 85%,rgba(164,232,206,.08),transparent 50%);
  pointer-events:none}
.hero-inner{max-width:1480px;margin:0 auto;padding:28px 40px 48px;position:relative;z-index:1}
.top-bar{display:flex;align-items:center;justify-content:space-between;gap:24px;padding-bottom:28px;
  border-bottom:1px solid var(--rule-on-ink);flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:14px}
.brand-wordmark{font-family:"DM Sans";font-weight:700;letter-spacing:-.03em;font-size:24px;line-height:1}
.brand-sub{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-top:4px;font-weight:600}
.top-bar .meta{display:flex;gap:28px;align-items:center;font-size:12px;color:rgba(255,255,255,.65);flex-wrap:wrap}
.top-bar .meta b{color:var(--white);font-weight:600}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:7px;
  box-shadow:0 0 0 4px rgba(4,180,119,.15);animation:pulse 2.2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(4,180,119,.12)}50%{box-shadow:0 0 0 7px rgba(4,180,119,.03)}}

.hero-title{margin:48px 0 30px;display:grid;grid-template-columns:1.3fr 1fr;gap:64px;align-items:end}
.eyebrow{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--green);font-weight:700;margin-bottom:14px}
h1.display{font-family:"DM Sans","Inter",sans-serif;font-weight:800;letter-spacing:-.045em;line-height:.92;margin:0;
  font-size:clamp(48px,7.2vw,104px)}
h1.display i{color:var(--mint);font-weight:700;font-style:normal}
.lead{font-size:15.5px;line-height:1.55;color:rgba(255,255,255,.75);max-width:480px;margin-top:14px}
.lead .hl{color:var(--green);font-weight:600}

/* ===== KPI ROW ===== */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:0;border-top:1px solid var(--rule-on-ink);margin-top:36px}
.kpi{padding:24px 22px 22px;border-right:1px solid var(--rule-on-ink);position:relative}
.kpi:last-child{border-right:none}
.kpi .kpi-label{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.5);font-weight:600;margin-bottom:10px}
.kpi .kpi-val{font-family:"DM Sans","Inter",sans-serif;font-weight:700;font-size:40px;letter-spacing:-.035em;line-height:1;color:var(--white)}
.kpi .kpi-val .unit{font-family:"Inter";font-weight:500;font-size:16px;color:rgba(255,255,255,.55);margin-left:4px;letter-spacing:0}
.kpi .kpi-sub{margin-top:8px;font-size:11.5px;color:rgba(255,255,255,.55);display:flex;align-items:center;gap:6px}
.kpi .kpi-spark{margin-top:14px;height:32px;width:100%}
.kpi.green .kpi-val{color:var(--green)}
.kpi.green .kpi-label{color:#82DBB6}
.badge-up{color:var(--green);font-weight:600;font-size:11px;font-family:"JetBrains Mono"}
.badge-down{color:var(--orange);font-weight:600;font-size:11px;font-family:"JetBrains Mono"}

/* ===== FILTER BAR ===== */
.filter-bar{max-width:1480px;margin:0 auto;padding:24px 40px 0;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.filter-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:var(--ink-muted)}
.filter-select{
  appearance:none;-webkit-appearance:none;
  font-family:"Inter",system-ui,sans-serif;font-size:13px;font-weight:600;
  color:var(--ink);background:var(--white);
  border:1.5px solid var(--rule-strong);border-radius:10px;
  padding:10px 36px 10px 14px;cursor:pointer;
  background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2339405A' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 12px center;
  transition:border-color .15s,box-shadow .15s}
.filter-select:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(4,180,119,.12)}
.filter-select:hover{border-color:var(--green)}

/* ===== BODY SECTIONS ===== */
.body-section{padding:84px 40px;max-width:1480px;margin:0 auto}
.section-head{display:grid;grid-template-columns:auto 1fr auto;gap:32px;align-items:baseline;
  border-top:1px solid var(--rule-strong);padding-top:22px;margin-bottom:38px}
.section-num{font-family:"JetBrains Mono";font-size:12px;letter-spacing:.05em;color:var(--ink-muted);font-weight:500}
.section-num b{color:var(--ink);font-weight:600}
.section-title{font-family:"DM Sans","Inter",sans-serif;font-weight:700;font-size:44px;letter-spacing:-.035em;line-height:1.02;margin:0}
.section-title i{font-weight:700;color:var(--green-dark);font-style:normal}
.section-kicker{font-size:14px;color:var(--ink-muted);max-width:320px;text-align:right;line-height:1.55}
.section-text{font-size:14px;color:var(--ink-muted);line-height:1.65;margin-bottom:24px;max-width:72ch}

/* ===== GRID ===== */
.grid{display:grid;gap:22px}
.g-1{grid-template-columns:1fr}
.g-2{grid-template-columns:1fr 1fr}
.g-3{grid-template-columns:1fr 1fr 1fr}
.g-2-1{grid-template-columns:2fr 1fr}
.g-1-2{grid-template-columns:1fr 2fr}

/* ===== CARD ===== */
.card{background:var(--white);border:1px solid var(--rule);border-radius:14px;padding:26px 26px 28px;
  box-shadow:var(--shadow-card);position:relative;overflow:hidden;transition:box-shadow .25s ease}
.card:hover{box-shadow:var(--shadow-hi)}
.card.dark{background:var(--ink);color:var(--white);border-color:transparent}
.card.eggshell{background:var(--eggshell);border-color:rgba(4,180,119,.12)}
.card.span-2{grid-column:1/-1}
.card-head{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.card-title{font-family:"DM Sans","Inter",sans-serif;font-weight:700;font-size:21px;letter-spacing:-.02em;line-height:1.15;margin:0}
.card-title i{font-weight:700;color:var(--green-dark);font-style:normal}
.card-sub{font-size:12px;color:var(--ink-muted);line-height:1.55;margin-top:6px}
.card.dark .card-sub{color:rgba(255,255,255,.62)}
.card-meta{font-family:"JetBrains Mono";font-size:11px;color:var(--ink-muted);letter-spacing:.02em}
.card-eyebrow{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--green-dark);font-weight:700;margin-bottom:8px}
.card.dark .card-eyebrow{color:#5BD5A5}

/* ===== INSIGHT ===== */
.insight{background:var(--ink);color:var(--white);border-radius:14px;padding:28px 32px 28px;position:relative;overflow:hidden;max-width:680px}
.insight.green{background:linear-gradient(160deg,#027C53 0%,#014835 100%)}
.insight.berry{background:linear-gradient(160deg,#8a0258 0%,#5a033a 100%)}
.insight.sand{background:var(--ink);background-image:linear-gradient(140deg,#10182C 0%,#1C243B 100%)}
.insight .i-eyebrow{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.65);font-weight:700;margin-bottom:14px}
.insight .i-title{font-family:"DM Sans","Inter",sans-serif;font-weight:700;font-size:24px;line-height:1.25;letter-spacing:-.025em;color:#fff}
.insight .i-body{font-size:14px;line-height:1.65;color:rgba(255,255,255,.88);margin-top:16px;max-width:56ch}
.insight .i-stat{font-family:"DM Sans","Inter",sans-serif;font-weight:700;letter-spacing:-.035em;font-size:56px;line-height:1;margin-top:18px;display:flex;align-items:baseline;gap:10px;color:#fff}
.insight.green .i-stat{color:#A4E8CE}
.insight .i-stat .unit{font-family:"Inter";font-weight:500;font-size:15px;letter-spacing:0;color:rgba(255,255,255,.7)}
.insight .corner{position:absolute;top:22px;right:22px;font-family:"JetBrains Mono";font-size:10.5px;letter-spacing:.05em;opacity:.6}

/* ===== CHART CONTAINERS ===== */
.chart-wrap{width:100%;position:relative}
.chart-wrap svg{width:100%;height:auto;display:block}

/* ===== BAR ROWS ===== */
.bar-row{display:grid;grid-template-columns:160px 1fr 64px;gap:14px;align-items:center;padding:8px 0;font-size:13px;
  border-radius:8px;transition:background .15s;margin:0 -8px;padding-left:8px;padding-right:8px}
.bar-row:hover{background:rgba(4,180,119,.04)}
.bar-row .lbl{color:var(--ink);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-row .val{font-family:"JetBrains Mono";color:var(--ink);text-align:right;font-weight:500;font-size:12.5px}
.bar-track{height:10px;background:rgba(16,24,44,.08);border-radius:999px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:999px;transition:width .6s ease}

/* ===== STAT STACK ===== */
.stat-stack{display:grid;grid-template-columns:1fr 1fr;gap:18px 28px}
.stat-stack .item{border-left:3px solid var(--green);padding:4px 0 4px 14px}
.stat-stack .item.orange{border-left-color:var(--orange)}
.stat-stack .item.berry{border-left-color:var(--berry)}
.stat-stack .item .k{font-family:"DM Sans","Inter",sans-serif;font-weight:700;font-size:32px;letter-spacing:-.03em;line-height:1}
.stat-stack .item .l{font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);margin-top:4px;font-weight:600}

/* ===== COMPARISON ===== */
.vs-row{display:grid;grid-template-columns:1fr auto 1fr;gap:0;align-items:stretch}
.vs-col{padding:28px;text-align:center}
.vs-col .group-label{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;font-weight:700;margin-bottom:14px}
.vs-col.a-col .group-label{color:var(--green-dark)}
.vs-col.b-col .group-label{color:var(--ink-muted)}
.vs-divider{width:1px;background:var(--rule-strong);margin:12px 0;position:relative;display:flex;align-items:center;justify-content:center}
.vs-divider .tag{position:absolute;background:var(--white);padding:8px 16px;font-family:"JetBrains Mono";font-size:14px;
  font-weight:700;color:var(--ink-muted);letter-spacing:.02em;border:1.5px solid var(--rule-strong);border-radius:10px;white-space:nowrap;
  box-shadow:0 2px 8px rgba(16,24,44,.06)}
.vs-col .big{font-family:"DM Sans","Inter",sans-serif;font-weight:700;font-size:48px;letter-spacing:-.035em;line-height:1}
.vs-col.a-col .big{color:var(--green-dark)}
.vs-col .detail{font-size:13px;color:var(--ink-muted);margin-top:8px;line-height:1.45}

/* ===== LEGEND ===== */
.legend{display:flex;gap:18px;flex-wrap:wrap;font-size:12px;color:var(--ink-muted);margin-top:14px}
.legend span{display:inline-flex;align-items:center;gap:7px}
.legend .sw{width:10px;height:10px;border-radius:3px;display:inline-block}

/* ===== CHIP ===== */
.chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;
  font-size:11px;font-weight:600;letter-spacing:.02em;background:rgba(4,180,119,.1);color:var(--green-dark)}
.chip.warn{background:rgba(251,80,4,.1);color:var(--orange)}
.chip.berry{background:rgba(188,2,120,.1);color:var(--berry)}
.chip.neutral{background:rgba(16,24,44,.06);color:var(--ink-muted)}

/* ===== STYLED TABLE ===== */
.styled-table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;margin-top:12px;border-radius:10px;overflow:hidden;
  border:1px solid var(--rule)}
.styled-table thead{background:var(--sand)}
.styled-table th{text-align:left;font-size:10px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;
  color:var(--ink-muted);padding:14px 18px;border-bottom:2px solid var(--rule-strong);white-space:nowrap}
.styled-table th:first-child{border-top-left-radius:10px}
.styled-table th:last-child{border-top-right-radius:10px}
.styled-table td{padding:13px 18px;border-bottom:1px solid var(--rule);vertical-align:middle;font-variant-numeric:tabular-nums;
  transition:background .12s}
.styled-table tr:last-child td{border-bottom:none}
.styled-table tr:last-child td:first-child{border-bottom-left-radius:10px}
.styled-table tr:last-child td:last-child{border-bottom-right-radius:10px}
.styled-table tbody tr:hover td{background:rgba(4,180,119,.05)}
.styled-table .num{font-family:"JetBrains Mono";font-weight:600;font-size:13px;color:var(--ink)}
.styled-table .num.positive{color:var(--green-dark)}
.styled-table .num.negative{color:var(--orange)}
.styled-table .row-label{font-weight:600;color:var(--ink)}
.styled-table .bar-cell{position:relative;padding-right:24px}
.styled-table .bar-cell .mini-bar{position:absolute;bottom:4px;left:18px;right:24px;height:3px;background:var(--rule);border-radius:2px;overflow:hidden}
.styled-table .bar-cell .mini-bar .mini-fill{height:100%;background:var(--green);border-radius:2px;transition:width .4s ease}

/* ===== HEATMAP ===== */
.heatmap-grid{display:grid;grid-template-columns:auto 1fr;grid-template-rows:auto 1fr;gap:10px 14px;min-height:380px}
.heatmap-grid .x-labels{grid-column:2;display:flex;justify-content:space-between;font-size:11px;color:var(--ink-muted);font-family:"JetBrains Mono";padding:0 2px}
.heatmap-grid .y-labels{grid-row:2;display:flex;flex-direction:column;justify-content:space-around;font-size:12px;font-weight:600;color:var(--ink);padding-right:10px;min-width:80px}
.card.dark .heatmap-grid .y-labels{color:rgba(255,255,255,.85)}
.heatmap-grid .cells{grid-row:2;grid-column:2;display:grid;gap:4px}
.hm-cell{border-radius:5px;transition:transform .14s ease;display:flex;align-items:center;justify-content:center;
  font-family:"JetBrains Mono";font-size:11px;color:rgba(255,255,255,.85);min-height:42px;padding:4px 2px;font-weight:500}
.hm-cell:hover{transform:scale(1.12);z-index:5;position:relative;box-shadow:0 2px 8px rgba(0,0,0,.2)}

/* ===== PROGRESS BAR ===== */
.progress-row{display:grid;grid-template-columns:140px 1fr 60px;gap:14px;align-items:center;padding:8px 0}
.progress-row .lbl{font-size:13px;font-weight:500;color:var(--ink)}
.progress-row .track{height:10px;background:rgba(16,24,44,.06);border-radius:999px;overflow:hidden}
.progress-row .fill{height:100%;border-radius:999px;background:var(--green);transition:width .6s ease}
.progress-row .val{font-family:"JetBrains Mono";font-size:12px;font-weight:600;text-align:right;color:var(--ink)}

/* ===== FUNNEL ===== */
.funnel-step{display:grid;grid-template-columns:180px 1fr 80px;gap:14px;align-items:center;padding:10px 0}
.funnel-bar{height:40px;border-radius:8px;display:flex;align-items:center;
  padding:0 16px;font-family:"JetBrains Mono";font-size:13px;font-weight:600;color:#fff;
  transition:filter .15s,transform .15s;min-width:44px;cursor:pointer;position:relative}
.funnel-bar:hover{filter:brightness(1.12);transform:translateX(3px)}
.funnel-label{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.funnel-label[title]{cursor:help}
.funnel-pct{font-family:"JetBrains Mono";font-size:12px;color:var(--ink-muted);text-align:right}
.funnel-conv{display:flex;justify-content:center;padding:0;margin:-4px 0}
.funnel-conv .pill{font-family:"JetBrains Mono";font-size:10.5px;font-weight:600;color:var(--ink-muted);
  background:rgba(16,24,44,.04);padding:3px 10px;border-radius:999px;display:inline-flex;align-items:center;gap:4px}

/* ===== CHART TOOLTIPS ===== */
.chart-tooltip{position:absolute;pointer-events:none;background:var(--ink);color:var(--white);
  padding:8px 12px;border-radius:8px;font-size:12px;font-family:"JetBrains Mono";
  box-shadow:var(--shadow-hi);z-index:10;white-space:nowrap;opacity:0;transition:opacity .15s}
.chart-tooltip::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:5px solid transparent;border-top-color:var(--ink)}
.chart-tooltip.show{opacity:1}
.chart-tooltip .tt-label{font-family:"Inter";font-weight:600;font-size:11px;opacity:.7;margin-bottom:4px}
.chart-tooltip .tt-val{font-weight:700;font-size:14px;color:var(--green)}

/* ===== CAVEAT / FORMULA / FILTER CHIPS ===== */
.caveat{font-size:13px;color:var(--orange);line-height:1.55;
  background:rgba(251,80,4,.08);padding:10px 14px;border-radius:8px;margin-top:4px}
.formula{font-family:"JetBrains Mono",monospace;font-size:12px;line-height:1.55;
  background:var(--sand);padding:10px 14px;border-radius:8px;color:var(--ink);margin-top:4px;white-space:pre-wrap}
.filter-chips{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.filter-chips .fchip{font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px}
.filter-chips .fchip.active{background:rgba(4,180,119,.12);color:var(--green-dark)}
.filter-chips .fchip.locked{background:rgba(16,24,44,.08);color:var(--ink-muted)}
.filter-chips .fchip.scope{background:rgba(188,2,120,.08);color:var(--berry)}
.audit-val{font-family:"DM Sans","Inter",sans-serif;font-weight:800;font-size:42px;letter-spacing:-.035em;
  line-height:1;color:var(--ink);margin:10px 0 8px}
.audit-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 20px;padding-top:14px;border-top:1px solid var(--rule)}
.audit-meta-grid .meta-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--ink-muted);margin-bottom:2px}
.audit-meta-grid .meta-value{font-size:13px;color:var(--ink);line-height:1.45}
.chain-step{position:relative;padding:10px 0 10px 20px;border-left:2px solid var(--rule-strong);margin-left:8px}
.chain-step::before{content:"";position:absolute;left:-5px;top:14px;width:8px;height:8px;border-radius:50%;background:var(--ink-muted);border:2px solid var(--white)}
.chain-step .step-label{font-size:12.5px;color:var(--ink);font-weight:600;line-height:1.4}
.chain-step .step-detail{font-size:11.5px;color:var(--ink-muted);margin-top:2px;line-height:1.45}
.chain-step .step-count{font-family:"JetBrains Mono";font-size:13px;font-weight:700;color:var(--ink);margin-top:2px}
.chain-step.result{border-left-color:var(--green)}
.chain-step.result::before{background:var(--green)}
.chain-step.result .step-label{color:var(--green-dark);font-weight:700}
.chain-step.result .step-count{color:var(--green-dark);font-size:14px;font-weight:800}
.sql-section{border:1px solid var(--rule);border-radius:10px;overflow:hidden;margin-top:10px}
.sql-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--sand)}
.sql-header .sql-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-muted)}
.copy-btn{font-size:11px;font-weight:600;color:var(--green-dark);background:rgba(4,180,119,.1);border:none;padding:6px 14px;border-radius:999px;cursor:pointer;transition:background .15s}
.copy-btn:hover{background:rgba(4,180,119,.18)}
.tables-used{padding:10px 14px;background:var(--sand);font-size:12px;color:var(--ink-muted);border-top:1px solid var(--rule)}
.tables-used code{font-family:"JetBrains Mono";font-size:11px;background:var(--white);padding:1px 6px;border-radius:4px}

/* ===== MERMAID ===== */
.mermaid-wrap{display:flex;justify-content:center;padding:32px 16px;overflow-x:auto;min-height:280px}
.mermaid-wrap .mermaid{width:100%;min-height:260px;display:flex;justify-content:center;align-items:center}
.mermaid-wrap .mermaid svg{width:100%;height:auto;min-height:260px;margin:0 auto;display:block}
.mermaid-wrap .mermaid .node rect{rx:10 !important;ry:10 !important}
.mermaid-wrap .mermaid .edgeLabel{font-size:13px;font-family:"Inter",sans-serif;overflow:visible !important}
.mermaid-wrap .mermaid .edgeLabel span{overflow:visible !important;white-space:nowrap !important;padding:2px 6px !important}
.mermaid-wrap .mermaid .edgeLabel foreignObject{overflow:visible !important}
.mermaid-wrap .mermaid .edgeLabel rect,.mermaid-wrap .mermaid .edgeLabel .label-container{overflow:visible !important;width:auto !important;min-width:fit-content !important}
.mermaid-wrap .mermaid .label{font-family:"Inter",sans-serif;font-size:13px !important;overflow:visible !important}
.mermaid-wrap .mermaid .node rect,.mermaid-wrap .mermaid .node polygon{rx:8;ry:8}
.mermaid-wrap .mermaid .nodeLabel{padding:8px 14px !important;font-family:"Inter",sans-serif;font-size:13px;overflow:visible !important;white-space:nowrap !important}

/* ===== GENERIC HOVER TOOLTIP ===== */
[data-tip]{position:relative;cursor:help}
[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:var(--ink);color:var(--white);padding:6px 12px;border-radius:8px;font-size:12px;font-family:"Inter";
  white-space:nowrap;z-index:20;pointer-events:none;box-shadow:var(--shadow-hi);font-weight:500}
[data-tip]:hover::before{content:"";position:absolute;bottom:calc(100% + 2px);left:50%;transform:translateX(-50%);
  border:4px solid transparent;border-top-color:var(--ink);z-index:20;pointer-events:none}

/* ===== DONUT HOVER ===== */
.chart-wrap path[opacity]{transition:opacity .2s ease}
.chart-wrap path[opacity]:hover{opacity:1 !important;filter:brightness(1.1)}

/* ===== BAR CHART HOVER ===== */
.chart-wrap .bar-hover{cursor:pointer}
.chart-wrap .bar-hover:hover rect.bar-fg{opacity:1;filter:brightness(1.08)}

/* ===== AUDITABLE ===== */
.auditable{cursor:pointer;border-bottom:1px dashed rgba(4,180,119,.4);transition:border-color .2s,color .2s}
.auditable:hover{border-bottom-color:#04B477;color:#04B477}

/* ===== AUDIT MODAL ===== */
.audit-overlay{position:fixed;inset:0;background:rgba(16,24,44,.4);z-index:1000;display:none;
  align-items:center;justify-content:center;padding:24px}
.audit-overlay.show{display:flex}
.audit-modal{background:var(--white);border-radius:16px;max-width:680px;width:100%;padding:0;position:relative;
  max-height:85vh;overflow-y:auto;box-shadow:0 24px 64px rgba(16,24,44,.18),0 8px 24px rgba(16,24,44,.08)}
.audit-close{position:absolute;top:12px;right:16px;background:none;border:none;font-size:24px;
  color:var(--ink-muted);cursor:pointer;z-index:2;line-height:1}
.audit-close:hover{color:var(--ink)}
.audit-top{padding:24px 28px 20px;background:linear-gradient(180deg,rgba(235,248,242,.6) 0%,var(--white) 100%);
  border-bottom:1px solid var(--rule)}
.audit-top h3{font-family:"DM Sans","Inter",sans-serif;font-weight:700;font-size:18px;letter-spacing:-.015em;
  color:var(--ink);margin:0 0 2px}
.audit-conf{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;margin-top:10px}
.audit-conf::before{content:"";width:7px;height:7px;border-radius:50%}
.audit-conf.high{color:#04B477}.audit-conf.high::before{background:#04B477}
.audit-conf.med{color:#b08800}.audit-conf.med::before{background:#FBBD04}
.audit-conf.low{color:#FB5004}.audit-conf.low::before{background:#FB5004}
.audit-body{padding:20px 28px 28px}
.audit-section{margin-bottom:18px}
.audit-section h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;
  color:var(--ink-muted);margin:0 0 6px}
.audit-section p{font-size:14px;color:var(--ink);line-height:1.6;margin:0}
.sql-block{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:11.5px;line-height:1.55;
  background:#10182C;color:#a4e8ce;padding:14px 16px;overflow-x:auto;white-space:pre;
  max-height:220px;overflow-y:auto;margin:0;border-radius:8px}

/* ===== FOOTER ===== */
.page-footer{background:var(--ink);color:rgba(255,255,255,.65);padding:40px;font-size:12px;line-height:1.6}
.page-footer .inner{max-width:1480px;margin:0 auto;display:flex;justify-content:space-between;gap:40px;flex-wrap:wrap}
.page-footer b{color:var(--white);font-weight:600}

/* ===== HIGHLIGHT NUMBER ===== */
.highlight-number{background:var(--ink);color:#fff;border-radius:14px;padding:56px 40px;position:relative;overflow:hidden;text-align:center}
.highlight-number::after{content:"";position:absolute;inset:0;pointer-events:none;
  background-image:radial-gradient(circle at 15% 30%,rgba(4,180,119,.14),transparent 55%),
                   radial-gradient(circle at 85% 70%,rgba(164,232,206,.08),transparent 55%)}
.highlight-number .hn-eyebrow{font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--green);font-weight:700;margin-bottom:28px;position:relative;z-index:1}
.highlight-number .hn-tally{font-family:"DM Sans","Inter",sans-serif;font-weight:800;font-size:clamp(48px,8vw,120px);letter-spacing:-.05em;line-height:.92;
  background:linear-gradient(180deg,#fff 40%,rgba(255,255,255,.6));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;position:relative;z-index:1}
.highlight-number .hn-unit{font-family:"DM Sans";font-weight:600;font-size:18px;color:rgba(255,255,255,.55);letter-spacing:.04em;text-transform:uppercase;margin-top:10px;position:relative;z-index:1}
.highlight-number .hn-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:20px;margin-top:32px;padding-top:24px;border-top:1px solid var(--rule-on-ink);position:relative;z-index:1}
.highlight-number .hn-metric{padding-left:14px;border-left:2px solid var(--green)}
.highlight-number .hn-metric .hn-mv{font-family:"DM Sans";font-weight:700;font-size:24px;letter-spacing:-.02em;color:#fff;line-height:1}
.highlight-number .hn-metric .hn-ml{font-size:12px;color:rgba(255,255,255,.55);margin-top:4px}

/* ===== QUAD (2x2 thermal grid) ===== */
.quad{display:grid;grid-template-columns:1fr 1fr;gap:4px;border-radius:14px;overflow:hidden}
.quad-cell{padding:32px 28px;position:relative;min-height:160px;display:flex;flex-direction:column;justify-content:center}
.quad-cell .bn{font-family:"DM Sans","Inter",sans-serif;font-weight:800;font-size:42px;letter-spacing:-.035em;line-height:1;color:#fff}
.quad-cell .top-lbl{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;font-weight:700;color:rgba(255,255,255,.7);margin-bottom:10px}
.quad-cell .tagline{font-size:13px;color:rgba(255,255,255,.75);margin-top:8px;font-weight:500}
.quad-cell .detail{font-family:"JetBrains Mono";font-size:11px;color:rgba(255,255,255,.5);margin-top:4px}
.quad-cell .corner{position:absolute;top:16px;right:16px;font-family:"JetBrains Mono";font-size:10px;letter-spacing:.05em;color:rgba(255,255,255,.4)}
.quad-cell.hot{background:linear-gradient(135deg,#04B477 0%,#027C53 100%)}
.quad-cell.warm{background:linear-gradient(135deg,#027C53 0%,#014835 100%)}
.quad-cell.cool{background:linear-gradient(135deg,#0D3F4A 0%,#1C243B 100%)}
.quad-cell.cold{background:linear-gradient(135deg,#1C243B 0%,#10182C 100%)}

/* ===== RESPONSIVE ===== */
@media(max-width:1200px){
  .hero-title{grid-template-columns:1fr;gap:24px}
  .kpi-row{grid-template-columns:1fr 1fr}
  .g-2,.g-3,.g-2-1,.g-1-2{grid-template-columns:1fr}
  .section-head{grid-template-columns:1fr;gap:12px}
  .section-kicker{text-align:left}
  .vs-row{grid-template-columns:1fr}
  .vs-divider{width:100%;height:1px;margin:0 12px}
  .stat-stack{grid-template-columns:1fr}
  .chart-wrap{overflow-x:auto}
  .heatmap-grid{overflow-x:auto}
  .hm-cell{min-height:22px;font-size:8px}
}
@media(max-width:720px){
  .body-section{padding:48px 20px}
  .hero-inner{padding:20px 20px 32px}
  .section-title{font-size:34px}
  h1.display{font-size:clamp(32px,10vw,56px);word-break:break-word;overflow-wrap:break-word}
  .filter-bar{padding:16px 20px 0}
  .kpi-row{grid-template-columns:1fr 1fr}
  .chart-wrap{max-width:100%;overflow-x:auto}
  .heatmap-grid{overflow-x:auto}
  .funnel-bar{min-width:60px}
}
@media print{
  .filter-bar,.audit-overlay{display:none!important}
  .body-section{padding:40px 20px}
  .card{break-inside:avoid}
}
